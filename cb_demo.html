              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                <div>
                  <div style={{ fontSize:15, fontWeight:500 }}>Projects for {struct.domain_name}</div>
                  <div style={{ fontSize:12, color:"var(--text-secondary)" }}>
                    Review and create each project in Codebeamer. Uses default template.
                  </div>
                </div>
                <button
                  style={creatingAllProjects ? { ...smallBtnStyle(true), opacity:0.5, cursor:"not-allowed" } : smallBtnStyle(true)}
                  disabled={creatingAllProjects}
                  onClick={createAllProjects}
                >
                  {creatingAllProjects ? "Creating..." : "Create All"}
                </button>
              </div>

              {/* Project Category */}
              <div style={{
                marginBottom:16, padding:"10px 14px", borderRadius:8,
                border: "1px solid #A7F3D0", background: "#D1FAE5",
                display:"flex", alignItems:"center", gap:8,
              }}>
                <span style={{ fontSize:16 }}>&#128193;</span>
                <div>
                  <div style={{ fontSize:13, fontWeight:500, color:"#065F46" }}>
                    Project Category: <span style={{ fontWeight:600 }}>{categoryName}</span>
                  </div>
                  <div style={{ fontSize:11, color:"#065F46", opacity:0.8 }}>
                    All projects will be created under this category in Codebeamer.
                  </div>
                </div>
              </div>

              {/* Render projects grouped by type */}
              {[
                { cat: "library", label: "Library Projects", desc: "Core subsystem projects (2 per library stream)", clr: "#0F6E56", bg: "#E1F5EE" },
                { cat: "product_line", label: "Product Line Projects", desc: "Cross-subsystem integration projects (1 per PL stream)", clr: "#534AB7", bg: "#EEEDFE" },
                { cat: "release", label: "Release Projects", desc: "Release-specific verification projects (1 per release stream)", clr: "#185FA5", bg: "#E6F1FB" },
              ].map(group => {
                const groupProjects = struct.projects.map((p, idx) => ({ ...p, _idx: idx })).filter(p => (p.category || "library") === group.cat);
                if (!groupProjects.length) return null;
                return (
                  <div key={group.cat} style={{ marginBottom:16 }}>
                    <div style={{
                      padding:"6px 10px", marginBottom:8, borderRadius:"0 6px 6px 0",
                      background: group.bg, borderLeft:`3px solid ${group.clr}`,
                    }}>
                      <span style={{ fontWeight:500, fontSize:13, color: group.clr }}>{group.label}</span>
                      <span style={{ fontSize:11, color: group.clr, opacity:.7, marginLeft:8 }}>
                        ({groupProjects.length}) &mdash; {group.desc}
                      </span>
                    </div>

                    {groupProjects.map(p => {
                      const idx = p._idx;
                      // Show which stream this PL/release project belongs to
                      const streamLabel = p.stream_key ? (() => {
                        const allStreams = [...(struct.product_line_streams||[]), ...(struct.release_streams||[])];
                        const s = allStreams.find(s => s.stream_key === p.stream_key);
                        return s ? s.stream_name : p.stream_key;
                      })() : null;

                      return (
                        <div key={idx} style={{
                          marginBottom:8, padding:"12px 14px", borderRadius:8,
                          border:`1px solid ${group.clr}30`, background:"var(--bg-secondary)",
                        }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                            <div>
                              <div style={{ fontSize:14, fontWeight:500 }}>
                                {p.project_name}
                                {streamLabel && (
                                  <span style={{ fontSize:11, fontWeight:400, color: group.clr, marginLeft:8 }}>
                                    &#8594; {streamLabel}
                                  </span>
                                )}
                              </div>
                              <div style={{ fontSize:11, color:"var(--text-tertiary)" }}>
                                Key: {p.project_key} &middot; {p.description}
                              </div>
                            </div>
                            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                              <StatusBadge status={projectStatus[idx] || "pending"} />
                              {projectStatus[idx] !== "done" && projectStatus[idx] !== "creating" && (
                                <button style={smallBtnStyle(true)} onClick={() => createProject(idx)}>Create</button>
                              )}
                            </div>
                          </div>

                          {projectStatus[idx] === "done" && (
                            <div style={{ fontSize:12, color:"#065F46", background:"#D1FAE5", padding:"6px 10px", borderRadius:6 }}>
                              Project ID: {projectIds[idx]}
                              {projectTrackers[idx]?.reqTrackerId && ` | Req: ${projectTrackers[idx].reqTrackerName || projectTrackers[idx].reqTrackerId}`}
                              {projectTrackers[idx]?.tcTrackerId && ` | TC: ${projectTrackers[idx].tcTrackerName || projectTrackers[idx].tcTrackerId}`}
                              {projectTrackers[idx]?.verifiesFieldId && ` | Verifies field: ${projectTrackers[idx].verifiesFieldId}`}
                              {projectTrackers[idx]?.tcTrackerId && !projectTrackers[idx]?.verifiesFieldId && ` | Verifies field: not found`}
                            </div>
                          )}
                          {projectErrors[idx] && (
                            <div style={{ fontSize:12, color:"#991B1B", background:"#FEE2E2", padding:"6px 10px", borderRadius:6 }}>
                              {projectErrors[idx]}
                            </div>
                          )}

                          {projectStatus[idx] !== "done" && (
                            <div style={{ display:"grid", gridTemplateColumns:"1fr 2fr", gap:8, marginTop:8 }}>
                              <div>
                                <div style={{ fontSize:11, color:"var(--text-tertiary)", marginBottom:2 }}>Key (max 8)</div>
                                <input style={{...inputStyle, fontSize:12}} value={p.project_key}
                                  onChange={e => updateStruct(s => { s.projects[idx].project_key = e.target.value.substring(0,8).replace(/[^a-zA-Z0-9_]/g,""); })} />
                              </div>
                              <div>
                                <div style={{ fontSize:11, color:"var(--text-tertiary)", marginBottom:2 }}>Project Name</div>
                                <input style={{...inputStyle, fontSize:12}} value={p.project_name}
                                  onChange={e => updateStruct(s => { s.projects[idx].project_name = e.target.value; })} />
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              })}

              <div style={{ display:"flex", gap:10, marginTop:16 }}>
                <button style={btnStyle(false)} onClick={() => setStep(0)}>Back</button>
                <button
                  style={validating ? btnDisabled : btnStyle(true)}
                  disabled={validating}
                  onClick={() => validateAndProceed(2)}
                >
                  {validating ? "Validating projects..." : "Continue to Requirements"}
                </button>
              </div>
            </div>
          )}

          {/* ══ Step 2: Requirements & Test Cases ═══════════════════ */}
          {step === 2 && struct && (
            <div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                <div>
                  <div style={{ fontSize:15, fontWeight:500 }}>Requirements & Test Cases</div>
                  <div style={{ fontSize:12, color:"var(--text-secondary)" }}>
                    5 requirements + 2 test cases per project. TC1 verifies reqs 1-3, TC2 verifies reqs 4-5.
                  </div>
                </div>
                <button
                  style={creatingAllReqs ? { ...smallBtnStyle(true), opacity:0.5, cursor:"not-allowed" } : smallBtnStyle(true)}
                  disabled={creatingAllReqs}
                  onClick={createAllReqs}
                >
                  {creatingAllReqs ? "Creating..." : "Create All"}
                </button>
              </div>

              {struct.projects.map((p, idx) => {
                const trackers = projectTrackers[idx];
                const reqs = p.requirements || [];
                return (
                  <div key={idx} style={{
                    marginBottom:12, padding:"12px 14px", borderRadius:8,
                    border:"1px solid var(--border-tertiary)", background:"var(--bg-secondary)",
                  }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                      <div>
                        <div style={{ fontSize:14, fontWeight:500 }}>{p.project_name}</div>
                        <div style={{ fontSize:11, color:"var(--text-tertiary)" }}>
                          {reqs.length} requirements &middot; {trackers?.reqTrackerName || `Req #${trackers?.reqTrackerId}` || "?"} &middot; {trackers?.tcTrackerName || `TC #${trackers?.tcTrackerId}` || "?"} {trackers?.verifiesFieldId ? `(Verifies: field ${trackers.verifiesFieldId})` : "(Verifies: not found)"}
                        </div>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <StatusBadge status={reqStatus[idx] || "pending"} />
                        {reqStatus[idx] !== "done" && reqStatus[idx] !== "creating" && (
                          <button style={smallBtnStyle(true)} onClick={() => createTrackerItems(idx)}>Create Items</button>
                        )}
                      </div>
                    </div>

                    <div style={{ maxHeight:200, overflowY:"auto", fontSize:12 }}>
                      {reqs.map((req, ri) => (
                        <div key={ri} style={{ padding:"5px 8px", marginBottom:2, borderRadius:4,
                          background:"var(--bg-primary)", border:"1px solid var(--border-tertiary)" }}>
                          <div style={{ fontWeight:500 }}>
                            <span style={{ color:"#854F0B" }}>REQ-{ri+1}</span> {req.title}
                          </div>
                          {(req.test_cases || []).map((tc, ti) => (
                            <div key={ti} style={{ marginLeft:14, color:"var(--text-tertiary)", fontSize:11 }}>
                              TC: {tc.title}
                            </div>
                          ))}
                        </div>
                      ))}
                    </div>

                    {reqStatus[idx] === "done" && reqCounts[idx] && (
                      <div style={{ fontSize:12, color:"#065F46", background:"#D1FAE5", padding:"6px 10px", borderRadius:6, marginTop:6 }}>
                        Created {reqCounts[idx].reqs} requirements, {reqCounts[idx].tcs} test cases, {reqCounts[idx].verifies} verifies links
                      </div>
                    )}
                    {reqErrors[idx] && (
                      <div style={{ fontSize:12, color:"#991B1B", background:"#FEE2E2", padding:"6px 10px", borderRadius:6, marginTop:6 }}>
                        {reqErrors[idx]}
                      </div>
                    )}
                  </div>
                );
              })}

              <div style={{ display:"flex", gap:10, marginTop:16 }}>
                <button style={btnStyle(false)} onClick={() => setStep(1)}>Back</button>
                <button
                  style={(allReqsCreated || DRY_RUN) ? btnStyle(true) : btnDisabled}
                  disabled={!(allReqsCreated || DRY_RUN)}
                  onClick={() => setStep(3)}
                >
                  Continue to Streams
                </button>
              </div>
            </div>
          )}

          {/* ══ Step 3: Streams ══════════════════════════════════════ */}
          {step === 3 && struct && (
            <div>
              <div style={{ marginBottom:14 }}>
                <div style={{ fontSize:15, fontWeight:500 }}>Stream Hierarchy</div>
                <div style={{ fontSize:12, color:"var(--text-secondary)" }}>
                  Create in order: Library &rarr; Product Line &rarr; Transform &rarr; Release.
                  {initialStreamId && <span> Initial Stream ID: <strong>{initialStreamId}</strong></span>}
                </div>
              </div>

              {/* Verification gate notice — replaces "Create All" */}
              <div style={{
                padding:"10px 14px", marginBottom:16, background:"#FFFBEB",
                border:"1px solid #FDE68A", borderRadius:8, fontSize:12, color:"#78350F",
              }}>
                <strong>Create streams one at a time.</strong> After each stream is created, verify in Codebeamer that the projects and content appear as selected before creating the next stream. The bulk "Create All" button has been removed for this step.
              </div>

              {TIERS.map(tier => {
                const streams = struct[tier.key] || [];
                if (!streams.length) return null;
                return (
                  <div key={tier.key} style={{ marginBottom:16 }}>
                    <div style={{
                      padding:"7px 12px", marginBottom:6, borderRadius:"0 6px 6px 0",
                      background:tier.bg, borderLeft:`3px solid ${tier.clr}`,
                    }}>
                      <span style={{ fontWeight:500, fontSize:13, color:tier.clr }}>{tier.label}</span>
                      <span style={{ fontSize:11, color:tier.clr, opacity:.7, marginLeft:8 }}>({streams.length} streams)</span>
                    </div>

                    {streams.map((st, idx) => {
                      const sKey = `${tier.key}_${idx}`;
                      const status = streamStatus[sKey] || "pending";
                      const progressMsg = streamProgress[sKey];
                      const allProjects = struct.projects || [];
                      const selectedKeys = st.project_keys || [];

                      // Lock individual Create buttons while ANY stream is in flight
                      // (prevents the user from kicking off a parallel chain after CB's
                      // toast says "Stream Created Successfully" — the PUTs are still running).
                      const anyInFlight = creatingAllStreams || Object.values(streamStatus).some(s => s === "creating");

                      // For PL/Transform/Release, show which library each project belongs to
                      const projLibMap = getProjectToLibraryMap();

                      return (
                        <div key={idx} style={{
                          marginLeft:12, marginBottom:8, padding:"10px 12px", borderRadius:8,
                          border:`1px solid ${tier.clr}40`, background:"var(--bg-secondary)",
                        }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                            <div>
                              <div style={{ fontSize:13, fontWeight:500 }}>{st.stream_name}</div>
                              <div style={{ fontSize:11, color:"var(--text-tertiary)" }}>
                                Key: {st.stream_key}
                                {st.parent_stream_key && ` | Parent: ${st.parent_stream_key}`}
                                {` | ${selectedKeys.length} projects selected`}
                              </div>
                              {progressMsg && (
                                <div style={{ fontSize:11, color: status === "done" ? "#065F46" : "#92400E",
                                  marginTop:4, fontStyle: status === "creating" ? "italic" : "normal" }}>
                                  {status === "creating" ? "⏳ " : "✓ "}{progressMsg}
                                </div>
                              )}
                            </div>
                            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                              <StatusBadge status={status} />
                              {status !== "done" && status !== "creating" && (
                                <button
                                  style={anyInFlight ? { ...smallBtnStyle(true), opacity:0.4, cursor:"not-allowed" } : smallBtnStyle(true)}
                                  disabled={anyInFlight}
                                  title={anyInFlight ? "Wait for the current stream to finish" : ""}
                                  onClick={() => createStream(tier.key, idx)}>
                                  Create
                                </button>
                              )}
                            </div>
                          </div>

                          {/* ── Library streams: fixed display, no selection ── */}
                          {tier.key === "library_streams" && status !== "done" && (
                            <div style={{ marginTop:8, padding:"6px 8px", background:"var(--bg-primary)",
                              borderRadius:6, border:"1px solid var(--border-tertiary)" }}>
                              <div style={{ fontSize:11, color:"var(--text-secondary)", marginBottom:4 }}>
                                Projects (fixed, 2 per library):
                              </div>
                              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:2 }}>
                                {allProjects.filter(p => selectedKeys.includes(p.project_key)).map((p, pi) => (
                                  <div key={pi} style={{
                                    display:"flex", alignItems:"center", gap:5, padding:"3px 6px",
                                    fontSize:11, borderRadius:4, background:`${tier.clr}10`,
                                  }}>
                                    <span style={{ color:tier.clr, fontWeight:500 }}>&#9679;</span>
                                    <span style={{ color:"var(--text-primary)" }}>{p.project_name}</span>
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}

                          {/* ── PL streams: library project selection + PL-specific project ── */}
                          {tier.key === "product_line_streams" && status !== "done" && (() => {
                            const plProject = allProjects.find(p => p.category === "product_line" && p.stream_key === st.stream_key);
                            return (
                              <div style={{ marginTop:8 }}>
                                {/* Library project selection */}
                                <div style={{ padding:"6px 8px", background:"var(--bg-primary)",
                                  borderRadius:6, border:"1px solid var(--border-tertiary)", marginBottom:6 }}>
                                  <div style={{ fontSize:11, fontWeight:500, color:"var(--text-secondary)", marginBottom:6 }}>
                                    Select projects from library streams:
                                  </div>
                                  <div>
                                    {(struct?.library_streams || []).map((lib, li) => {
                                      const libProjects = allProjects.filter(p => (p.category === "library" || !p.category) && (lib.project_keys || []).includes(p.project_key));
                                      if (!libProjects.length) return null;
                                      const allInLibSelected = libProjects.every(p => selectedKeys.includes(p.project_key));
                                      const someInLibSelected = libProjects.some(p => selectedKeys.includes(p.project_key));
                                      return (
                                        <div key={li} style={{
                                          marginBottom: li < (struct.library_streams.length - 1) ? 8 : 0,
                                          padding:"6px 8px", borderRadius:6,
                                          background: someInLibSelected ? "#E1F5EE" : "var(--bg-secondary)",
                                          border:`1px solid ${someInLibSelected ? "#0F6E5640" : "var(--border-tertiary)"}`,
                                        }}>
                                          <label style={{
                                            display:"flex", alignItems:"center", gap:6, marginBottom:4,
                                            fontSize:11, fontWeight:600, cursor:"pointer", color:"#0F6E56",
                                          }}>
                                            <input type="checkbox"
                                              checked={allInLibSelected}
                                              ref={el => { if (el) el.indeterminate = someInLibSelected && !allInLibSelected; }}
                                              onChange={(e) => {
                                                updateStruct(s => {
                                                  let keys = s.product_line_streams[idx].project_keys || [];
                                                  for (const lp of libProjects) {
                                                    if (e.target.checked) {
                                                      if (!keys.includes(lp.project_key)) keys.push(lp.project_key);
                                                    } else {
                                                      keys = keys.filter(k => k !== lp.project_key);
                                                    }
                                                  }
                                                  s.product_line_streams[idx].project_keys = keys;
                                                  const editedPlKey = s.product_line_streams[idx].stream_key;
                                                  // Mirror PL → ONLY the Transforms branched from THIS PL
                                                  const trsForThisPl = (s.transform_streams || []).filter(t => t.parent_stream_key === editedPlKey);
                                                  for (const tr of trsForThisPl) tr.project_keys = [...keys];
                                                  // Mirror PL → ONLY the Releases whose Transform is branched from THIS PL
                                                  const trKeysForThisPl = new Set(trsForThisPl.map(t => t.stream_key));
                                                  for (let ri = 0; ri < (s.release_streams || []).length; ri++) {
                                                    if (!trKeysForThisPl.has(s.release_streams[ri].parent_stream_key)) continue;
                                                    const relExtras = (s.release_streams[ri].project_keys || []).filter(k =>
                                                      allProjects.some(p => p.project_key === k && p.category === "release")
                                                    );
                                                    s.release_streams[ri].project_keys = [...keys, ...relExtras];
                                                  }
                                                });
                                              }}
                                            />
                                            {lib.stream_name}
                                            <span style={{ fontWeight:400, color:"var(--text-tertiary)" }}>
                                              ({libProjects.filter(p => selectedKeys.includes(p.project_key)).length}/{libProjects.length})
                                            </span>
                                          </label>
                                          <div style={{ marginLeft:18, display:"grid", gridTemplateColumns:"1fr 1fr", gap:1 }}>
                                            {libProjects.map((p, pi) => {
                                              const isSelected = selectedKeys.includes(p.project_key);
                                              return (
                                                <label key={pi} style={{
                                                  display:"flex", alignItems:"center", gap:5, padding:"2px 4px",
                                                  fontSize:11, cursor:"pointer", borderRadius:3,
                                                  background: isSelected ? `${tier.clr}08` : "transparent",
                                                }}>
                                                  <input type="checkbox" checked={isSelected}
                                                    onChange={(e) => {
                                                      updateStruct(s => {
                                                        let keys = s.product_line_streams[idx].project_keys || [];
                                                        if (e.target.checked) {
                                                          if (!keys.includes(p.project_key)) keys.push(p.project_key);
                                                        } else {
                                                          keys = keys.filter(k => k !== p.project_key);
                                                        }
                                                        s.product_line_streams[idx].project_keys = keys;
                                                        const editedPlKey = s.product_line_streams[idx].stream_key;
                                                        // Mirror PL → ONLY the Transforms branched from THIS PL
                                                        const trsForThisPl = (s.transform_streams || []).filter(t => t.parent_stream_key === editedPlKey);
                                                        for (const tr of trsForThisPl) tr.project_keys = [...keys];
                                                        // Mirror PL → ONLY the Releases whose Transform is branched from THIS PL
                                                        const trKeysForThisPl = new Set(trsForThisPl.map(t => t.stream_key));
                                                        for (let ri = 0; ri < (s.release_streams || []).length; ri++) {
                                                          if (!trKeysForThisPl.has(s.release_streams[ri].parent_stream_key)) continue;
                                                          const relExtras = (s.release_streams[ri].project_keys || []).filter(k =>
                                                            allProjects.some(p2 => p2.project_key === k && p2.category === "release")
                                                          );
                                                          s.release_streams[ri].project_keys = [...keys, ...relExtras];
                                                        }
                                                      });
                                                    }}
                                                  />
                                                  <span style={{ color:"var(--text-primary)" }}>{p.project_name}</span>
                                                </label>
                                              );
                                            })}
                                          </div>
                                        </div>
                                      );
                                    })}
                                  </div>
                                </div>

                                {/* PL-specific project (auto-included) */}
                                {plProject && (
                                  <div style={{ padding:"6px 8px", background:"#EEEDFE",
                                    borderRadius:6, border:"1px solid #534AB740" }}>
                                    <div style={{ fontSize:11, fontWeight:500, color:"#534AB7", marginBottom:4 }}>
                                      Product Line project (auto-included):
                                    </div>
                                    <div style={{
                                      display:"flex", alignItems:"center", gap:5, padding:"3px 6px",
                                      fontSize:11, borderRadius:4, background:"#534AB710",
                                    }}>
                                      <span style={{ color:"#534AB7", fontWeight:500 }}>&#9679;</span>
                                      <span style={{ color:"var(--text-primary)" }}>{plProject.project_name}</span>
                                      <span style={{ fontSize:10, color:"var(--text-tertiary)", marginLeft:"auto" }}>
                                        Key: {plProject.project_key}
                                      </span>
                                    </div>
                                  </div>
                                )}
                              </div>
                            );
                          })()}

                          {/* ── Transform streams: read-only mirror of PL ── */}
                          {tier.key === "transform_streams" && status !== "done" && (() => {
                            // Also include PL-specific projects in the mirror display
                            const plProjects = allProjects.filter(p => p.category === "product_line");
                            return (
                              <div style={{ marginTop:8, padding:"6px 8px", background:"var(--bg-primary)",
                                borderRadius:6, border:"1px solid var(--border-tertiary)" }}>
                                <div style={{ fontSize:11, color:"var(--text-secondary)", marginBottom:4 }}>
                                  Projects (mirrored from Product Line):
                                </div>
                                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:2 }}>
                                  {allProjects.filter(p => selectedKeys.includes(p.project_key)).map((p, pi) => {
                                    const libKey = projLibMap[p.project_key];
                                    const libStream = (struct?.library_streams || []).find(l => l.stream_key === libKey);
                                    return (
                                      <div key={pi} style={{
                                        display:"flex", alignItems:"center", gap:5, padding:"3px 6px",
                                        fontSize:11, borderRadius:4, background:`${tier.clr}10`,
                                      }}>
                                        <span style={{ color:tier.clr, fontWeight:500 }}>&#9679;</span>
                                        <span style={{ color:"var(--text-primary)" }}>{p.project_name}</span>
                                        {libStream && (
                                          <span style={{ fontSize:10, color:"var(--text-tertiary)", marginLeft:"auto" }}>
                                            {libStream.stream_name.length > 18 ? libStream.stream_name.substring(0,18) + "..." : libStream.stream_name}
                                          </span>
                                        )}
                                      </div>
                                    );
                                  })}
                                  {plProjects.map((p, pi) => (
                                    <div key={`pl_${pi}`} style={{
                                      display:"flex", alignItems:"center", gap:5, padding:"3px 6px",
                                      fontSize:11, borderRadius:4, background:"#534AB710",
                                    }}>
                                      <span style={{ color:"#534AB7", fontWeight:500 }}>&#9679;</span>
                                      <span style={{ color:"var(--text-primary)" }}>{p.project_name}</span>
                                      <span style={{ fontSize:10, color:"#534AB7", marginLeft:"auto" }}>PL</span>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            );
                          })()}

                          {/* ── Release streams: mirror Transform + release-specific project + selection ── */}
                          {tier.key === "release_streams" && status !== "done" && (() => {
                            const relProject = allProjects.find(p => p.category === "release" && p.stream_key === st.stream_key);
                            // Library keys currently selected (mirrored from Transform/PL)
                            const mirroredLibKeys = selectedKeys.filter(k =>
                              allProjects.some(p => p.project_key === k && (p.category === "library" || !p.category))
                            );
                            // PL projects (also mirrored)
                            const plProjects = allProjects.filter(p => p.category === "product_line");
                            // Other release projects the user could additionally include
                            const otherRelProjects = allProjects.filter(p =>
                              p.category === "release" && p.stream_key !== st.stream_key
                            );
                            return (
                              <div style={{ marginTop:8 }}>
                                {/* Mirrored projects from Transform (read-only) */}
                                <div style={{ padding:"6px 8px", background:"var(--bg-primary)",
                                  borderRadius:6, border:"1px solid var(--border-tertiary)", marginBottom:6 }}>
                                  <div style={{ fontSize:11, color:"var(--text-secondary)", marginBottom:4 }}>
                                    Projects (mirrored from Transform):
                                  </div>
                                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:2 }}>
                                    {allProjects.filter(p => mirroredLibKeys.includes(p.project_key)).map((p, pi) => {
                                      const libKey = projLibMap[p.project_key];
                                      const libStream = (struct?.library_streams || []).find(l => l.stream_key === libKey);
                                      return (
                                        <div key={pi} style={{
                                          display:"flex", alignItems:"center", gap:5, padding:"3px 6px",
                                          fontSize:11, borderRadius:4, background:`${tier.clr}10`,
                                        }}>
                                          <span style={{ color:tier.clr, fontWeight:500 }}>&#9679;</span>
                                          <span style={{ color:"var(--text-primary)" }}>{p.project_name}</span>
                                          {libStream && (
                                            <span style={{ fontSize:10, color:"var(--text-tertiary)", marginLeft:"auto" }}>
                                              {libStream.stream_name.length > 15 ? libStream.stream_name.substring(0,15) + "..." : libStream.stream_name}
                                            </span>
                                          )}
                                        </div>
                                      );
                                    })}
                                    {plProjects.map((p, pi) => (
                                      <div key={`pl_${pi}`} style={{
                                        display:"flex", alignItems:"center", gap:5, padding:"3px 6px",
                                        fontSize:11, borderRadius:4, background:"#534AB710",
                                      }}>
                                        <span style={{ color:"#534AB7", fontWeight:500 }}>&#9679;</span>
                                        <span style={{ color:"var(--text-primary)" }}>{p.project_name}</span>
                                        <span style={{ fontSize:10, color:"#534AB7", marginLeft:"auto" }}>PL</span>
                                      </div>
                                    ))}
                                  </div>
                                </div>

                                {/* Release-specific project (auto-included) */}
                                {relProject && (
                                  <div style={{ padding:"6px 8px", background:"#E6F1FB",
                                    borderRadius:6, border:"1px solid #185FA540", marginBottom:6 }}>
                                    <div style={{ fontSize:11, fontWeight:500, color:"#185FA5", marginBottom:4 }}>
                                      Release project (auto-included):
                                    </div>
                                    <div style={{
                                      display:"flex", alignItems:"center", gap:5, padding:"3px 6px",
                                      fontSize:11, borderRadius:4, background:"#185FA510",
                                    }}>
                                      <span style={{ color:"#185FA5", fontWeight:500 }}>&#9679;</span>
                                      <span style={{ color:"var(--text-primary)" }}>{relProject.project_name}</span>
                                      <span style={{ fontSize:10, color:"var(--text-tertiary)", marginLeft:"auto" }}>
                                        Key: {relProject.project_key}
                                      </span>
                                    </div>
                                  </div>
                                )}

                                {/* Optionally add other release projects */}
                                {otherRelProjects.length > 0 && (
                                  <div style={{ padding:"6px 8px", background:"var(--bg-primary)",
                                    borderRadius:6, border:"1px solid var(--border-tertiary)" }}>
                                    <div style={{ fontSize:11, fontWeight:500, color:"var(--text-secondary)", marginBottom:4 }}>
                                      Add other release projects (optional):
                                    </div>
                                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:2 }}>
                                      {otherRelProjects.map((p, pi) => {
                                        const isSelected = selectedKeys.includes(p.project_key);
                                        return (
                                          <label key={pi} style={{
                                            display:"flex", alignItems:"center", gap:5, padding:"2px 4px",
                                            fontSize:11, cursor:"pointer", borderRadius:3,
                                            background: isSelected ? `${tier.clr}08` : "transparent",
                                          }}>
                                            <input type="checkbox" checked={isSelected}
                                              onChange={(e) => {
                                                updateStruct(s => {
                                                  const keys = s.release_streams[idx].project_keys || [];
                                                  if (e.target.checked) {
                                                    if (!keys.includes(p.project_key)) keys.push(p.project_key);
                                                  } else {
                                                    s.release_streams[idx].project_keys = keys.filter(k => k !== p.project_key);
                                                  }
                                                });
                                              }}
                                            />
                                            <span style={{ color:"var(--text-primary)" }}>{p.project_name}</span>
                                          </label>
                                        );
                                      })}
                                    </div>
                                  </div>
                                )}
                              </div>
                            );
                          })()}

                          {/* Done state */}
                          {status === "done" && streamIds[st.stream_key] && (
                            <div style={{ marginTop:6, fontSize:11, color:"#065F46", background:"#D1FAE5", padding:"6px 10px", borderRadius:6 }}>
                              Stream ID: {streamIds[st.stream_key]}
                            </div>
                          )}
                          {streamErrors[sKey] && (
                            <div style={{ fontSize:11, color:"#991B1B", background:"#FEE2E2", padding:"4px 8px", borderRadius:4, marginTop:4 }}>
                              {streamErrors[sKey]}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              })}

              {(() => {
                // Live mode: View Summary is gated on every stream being "done"
                // — prevents the consultant from showing the customer a half-built
                // tree. Dry run: this gate is just friction (no real provisioning,
                // user is testing the flow), so we unconditionally enable View
                // Summary in dry run regardless of streamStatus.
                const totalStreams = TIERS.reduce((a,t) => a + (struct[t.key]||[]).length, 0);
                const doneStreams = Object.values(streamStatus).filter(s => s === "done").length;
                const allDone = totalStreams > 0 && doneStreams >= totalStreams;
                const summaryEnabled = DRY_RUN || allDone;
                const anyPending = !allDone;
                const cleanupBtnStyle = (anyPending && !creatingAllStreams)
                  ? smallBtnStyle(false)
                  : { ...smallBtnStyle(false), opacity:0.4, cursor:"not-allowed" };
                const summaryBtnStyle = summaryEnabled
                  ? btnStyle(true)
                  : { ...btnStyle(true), opacity:0.4, cursor:"not-allowed" };
                return (
                  <div style={{
                    display:"flex", alignItems:"center", gap:10, marginTop:20,
                    paddingTop:14, borderTop:"1px solid var(--border-secondary)",
                  }}>
                    <button style={btnStyle(false)} onClick={() => setStep(2)}>Back</button>
                    <button
                      style={cleanupBtnStyle}
                      disabled={!anyPending || creatingAllStreams}
                      title={anyPending ? "Open the cleanup panel — your wizard state is preserved" : "All streams created — use Summary to wrap up"}
                      onClick={() => { setAbortMode(false); setStep(4); }}>
                      Cleanup partial run
                    </button>
                    <button
                      style={cleanupBtnStyle}
                      disabled={!anyPending || creatingAllStreams}
                      title={anyPending ? "Cleanup, then reset the wizard to Step 0" : "All streams created — use Summary to wrap up"}
                      onClick={() => {
                        if (!confirm("Abort this run?\n\nYou'll be sent to the cleanup page. After cleaning up, click 'Start New Demo' to reset the wizard.")) return;
                        setAbortMode(true);
                        setStep(4);
                      }}>
                      Abort &amp; restart
                    </button>
                    <span style={{ flex:1 }} />
                    <button
                      style={summaryBtnStyle}
                      disabled={!summaryEnabled}
                      title={summaryEnabled
                        ? (DRY_RUN && !allDone ? "Dry Run — skip ahead to test the summary" : "")
                        : `Create all streams first (${doneStreams}/${totalStreams} done)`}
                      onClick={() => summaryEnabled && setStep(4)}>
                      View Summary
                    </button>
                  </div>
                );
              })()}
            </div>
          )}

          {/* ══ Step 4: Summary v2 ════════════════════════════════════ */}
          {step === 4 && struct && (() => {
            // Helpers — kept local to Step 4 render
            const isOpen = (key) => summaryAllExpanded || !!summaryExpanded[key];
            const toggleOpen = (key) => setSummaryExpanded(prev => ({ ...prev, [key]: !prev[key] }));
            const tierByKey = TIERS.reduce((acc,t)=>{ acc[t.key]=t; return acc; }, {});

            // ─── CB deep-link helpers ─────────────────────────────────
            // Strip trailing slashes so we don't produce "//cb/..." URLs.
            const cbBase = (cbUrl || "").replace(/\/+$/, "");
            const cbProjectUrl = (key) => key && cbBase ? `${cbBase}/cb/project/${encodeURIComponent(key)}` : null;
            const cbIssueUrl   = (id)  => id  && cbBase ? `${cbBase}/cb/issue/${id}` : null;
            const cbStreamUrl  = (id)  => id  && cbBase ? `${cbBase}/cb/streams/projectList.spr?streamId=${id}` : null;

            // Trailing icon link — opens in new tab, swallows row-click so the
            // expand/collapse caret on the parent row doesn't fire.
            // Hover: tint to PTC blue (corporate accent for links).
            const ExtLink = ({ href, title }) => href ? (
              <a href={href} target="_blank" rel="noopener noreferrer" title={title}
                onClick={(e) => e.stopPropagation()}
                style={{
                  fontSize: 12, color: "var(--text-tertiary)", textDecoration: "none",
                  padding: "0 4px", lineHeight: 1, cursor: "pointer",
                }}
                onMouseEnter={(e) => { e.currentTarget.style.color = "var(--ptc-blue)"; }}
                onMouseLeave={(e) => { e.currentTarget.style.color = "var(--text-tertiary)"; }}>
                ↗
              </a>
            ) : null;

            // Inline ID anchor — same color as the existing "id N" text,
            // underline + PTC blue on hover (corporate link accent).
            const IdLink = ({ href, label }) => href ? (
              <a href={href} target="_blank" rel="noopener noreferrer"
                onClick={(e) => e.stopPropagation()}
                style={{
                  color: "var(--text-tertiary)", fontFamily: "monospace", fontSize: 11,
                  textDecoration: "none", cursor: "pointer",
                }}
                onMouseEnter={(e) => {
                  e.currentTarget.style.textDecoration = "underline";
                  e.currentTarget.style.color = "var(--ptc-blue)";
                }}
                onMouseLeave={(e) => {
                  e.currentTarget.style.textDecoration = "none";
                  e.currentTarget.style.color = "var(--text-tertiary)";
                }}>
                {label}
              </a>
            ) : (
              <span style={{ color: "var(--text-tertiary)", fontFamily: "monospace", fontSize: 11 }}>{label}</span>
            );

            // Build a stream-key → stream_name lookup for "source: <name>" display
            const streamNameByKey = {};
            for (const t of TIERS) for (const s of (struct[t.key]||[])) streamNameByKey[s.stream_key] = s.stream_name;

            // Determine "source stream" label for a given project in a given stream
            const projectToLibKey = projectToLibraryMap;
            const sourceLabelForProject = (tierKey, stream, projectKey) => {
              const proj = struct.projects?.find(p => p.project_key === projectKey);
              const cat = proj?.category;
              if (tierKey === "library_streams") return "Initial Stream";
              if (tierKey === "product_line_streams") {
                if (cat === "library") return streamNameByKey[projectToLibKey[projectKey]] || "Initial Stream";
                if (cat === "product_line") return "Initial Stream";
                return "—";
              }
              if (tierKey === "release_streams" && cat === "release") return "Initial Stream";
              return "—";
            };

            // ─── Export helpers ─────────────────────────────────────────
            // HTML escape (defense against project names with <, &, " in them)
            const esc = (s) => String(s == null ? "" : s)
              .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;").replace(/'/g, "&#39;");

            // Filename-safe timestamp: YYYY-MM-DD-HHmm
            const fileTs = (d) => {
              const p = (n) => String(n).padStart(2, "0");
              return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}-${p(d.getHours())}${p(d.getMinutes())}`;
            };

            // Build a self-contained, print-friendly HTML report from the
            // current summary state. All CSS is inlined (no var(--...)
            // references) so the file renders identically offline.
            const buildExportHtml = () => {
              const tsLabel = generatedAt ? generatedAt.toLocaleString() : new Date().toLocaleString();
              const totalReqs = Object.values(reqCounts).reduce((a,c) => a + (c?.reqs||0), 0);
              const totalTcs = Object.values(reqCounts).reduce((a,c) => a + (c?.tcs||0), 0);
              const totalStreams = TIERS.reduce((a,t) => a + (struct[t.key]||[]).length, 0);

              const projRows = struct.projects.map((p, i) => {
                const cat = p.category || "library";
                const tier = cat === "release" ? TIERS[3] : cat === "product_line" ? TIERS[1] : TIERS[0];
                const arts = projectArtifacts[i];
                const pid = projectIds[i];
                const projUrl = cbProjectUrl(p.project_key);
                const reqsHtml = (arts?.reqs || []).map(r => {
                  const u = cbIssueUrl(r.id);
                  return `<div class="art-row"><span>${esc(r.title)}</span><span class="art-id">${u ? `<a href="${esc(u)}">id ${esc(r.id)}</a>` : `id ${esc(r.id)}`}</span></div>`;
                }).join("");
                const tcsHtml = (arts?.tcs || []).map(t => {
                  const u = cbIssueUrl(t.id);
                  const verLinks = (t.verifies||[]).map(rid => {
                    const vu = cbIssueUrl(rid);
                    return vu ? `<a href="${esc(vu)}">${esc(rid)}</a>` : esc(rid);
                  }).join(", ");
                  return `<div class="art-row"><span>${esc(t.title)}</span><span class="art-meta">verifies ${verLinks}</span><span class="art-id">${u ? `<a href="${esc(u)}">id ${esc(t.id)}</a>` : `id ${esc(t.id)}`}</span></div>`;
                }).join("");
                return `
                  <div class="proj print-section">
                    <div class="proj-head">
                      <span class="dot" style="background:${tier.clr}"></span>
                      <span class="proj-name">${projUrl ? `<a href="${esc(projUrl)}">${esc(p.project_name)}</a>` : esc(p.project_name)}</span>
                      <span class="pill" style="color:${tier.clr};background:${tier.bg}">${esc(cat === "product_line" ? "product line" : cat)}</span>
                      <span class="proj-id">${pid ? (projUrl ? `<a href="${esc(projUrl)}">id ${esc(pid)}</a>` : `id ${esc(pid)}`) : "—"}</span>
                    </div>
                    ${arts ? `
                    <div class="proj-body">
                      ${(arts.reqs?.length) ? `<div class="art-block"><div class="art-label">${arts.reqs.length} REQUIREMENTS</div>${reqsHtml}</div>` : ""}
                      ${(arts.tcs?.length) ? `<div class="art-block"><div class="art-label">${arts.tcs.length} TEST CASES</div>${tcsHtml}</div>` : ""}
                    </div>` : ""}
                  </div>`;
              }).join("");

              const streamSections = TIERS.map(tier => {
                const streams = struct[tier.key] || [];
                if (!streams.length) return "";
                const rows = streams.map(st => {
                  const sid = streamIds[st.stream_key];
                  const sUrl = cbStreamUrl(sid);
                  const ownedKeys = (() => {
                    const own = { library_streams:["library"], product_line_streams:["library","product_line"], transform_streams:[], release_streams:["release"] }[tier.key] || [];
                    return (st.project_keys || []).filter(pk => {
                      const p = struct.projects?.find(p => p.project_key === pk);
                      return p && own.includes(p.category);
                    });
                  })();
                  const inheritedCount = (st.project_keys?.length || 0) - ownedKeys.length;
                  const parentName = st.parent_stream_key ? streamNameByKey[st.parent_stream_key] : null;
                  let summary;
                  if (tier.key === "library_streams" || tier.key === "product_line_streams")
                    summary = `No parent — independent root  ·  ${ownedKeys.length} project${ownedKeys.length===1?"":"s"}`;
                  else if (tier.key === "transform_streams")
                    summary = `Branched from ${parentName || "—"}  ·  mirrors ${inheritedCount} project${inheritedCount===1?"":"s"} via inheritance`;
                  else
                    summary = `Branched from ${parentName || "—"}  ·  inherits ${inheritedCount}  ·  ${ownedKeys.length} release-specific`;

                  const projRows = ownedKeys.map(pk => {
                    const p = struct.projects?.find(pr => pr.project_key === pk);
                    const projUrl = cbProjectUrl(pk);
                    return `<div class="stream-proj"><span>${projUrl ? `<a href="${esc(projUrl)}">${esc(p?.project_name || pk)}</a>` : esc(p?.project_name || pk)}</span><span class="source">source: ${esc(sourceLabelForProject(tier.key, st, pk))}</span></div>`;
                  }).join("");

                  return `
                    <div class="stream print-section" style="border-left:3px solid ${tier.clr}">
                      <div class="stream-head">
                        <span class="stream-name">${sessionPrefix ? `<span class="prefix">[${esc(sessionPrefix)}]</span> ` : ""}${sUrl ? `<a href="${esc(sUrl)}">${esc(st.stream_name)}</a>` : esc(st.stream_name)}</span>
                        <span class="stream-id">${sid ? (sUrl ? `<a href="${esc(sUrl)}">id ${esc(sid)}</a>` : `id ${esc(sid)}`) : "—"}</span>
                      </div>
                      <div class="stream-sub">${esc(summary)}</div>
                      ${ownedKeys.length ? `<div class="stream-projs">${projRows}</div>` : ""}
                    </div>`;
                }).join("");
                return `<div class="tier-block"><h2 class="tier-label" style="color:${tier.clr}">${esc(tier.label)} <span class="tier-count">(${streams.length})</span></h2>${rows}</div>`;
              }).join("");

              return `<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<title>Codebeamer ALM Demo Summary — ${esc(struct.domain_name)} — ${esc(sessionPrefix||"")}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #212529; background: #fff; padding: 32px; max-width: 900px; margin: 0 auto; }

  a:hover { text-decoration: underline; }
  h1 { font-size: 22px; font-weight: 600; margin-bottom: 4px; }

  .meta { font-size: 12px; color: #6c757d; margin-bottom: 24px; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 24px; }

  .art-row > span:first-child { flex: 1; }
  .art-meta { color: #adb5bd; font-size: 11px; }
  .art-id { color: #adb5bd; font-family: monospace; font-size: 11px; min-width: 90px; text-align: right; }

  .stream-head { display: flex; align-items: center; gap: 10px; }
  .stream-name { font-size: 13px; font-weight: 500; flex: 1; }
  .prefix { color: #adb5bd; font-weight: 400; }
  .stream-sub { font-size: 11px; color: #6c757d; margin-top: 4px; padding-left: 4px; }
  .stream-projs { margin-top: 8px; padding-left: 16px; border-left: 2px solid #dee2e6; }

  .stream-proj > span:first-child { flex: 1; }
