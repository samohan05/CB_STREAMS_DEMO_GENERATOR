  footer a { color: inherit; text-decoration: underline; }
  @media print {
    body { padding: 0; }
    .stream, .proj { page-break-inside: avoid; }
    a[href]:after { content: " (" attr(href) ")"; font-size: 9px; color: #6c757d; }
  }
</style>
</head><body>
<h1>Demo Summary: ${esc(struct.domain_name)}</h1>
<div class="meta">${sessionPrefix ? `[${esc(sessionPrefix)}] · ` : ""}${DRY_RUN ? "Dry Run" : "Live mode"}${tsLabel ? ` · Created ${esc(tsLabel)}` : ""}</div>

<div class="stats">
  <div class="stat" style="background:#EEEDFE"><div class="stat-val" style="color:#534AB7">${struct.projects?.length || 0}</div><div class="stat-lbl">Projects</div></div>
  <div class="stat" style="background:#FAEEDA"><div class="stat-val" style="color:#854F0B">${totalReqs}</div><div class="stat-lbl">Requirements</div></div>
  <div class="stat" style="background:#E6F1FB"><div class="stat-val" style="color:#185FA5">${totalTcs}</div><div class="stat-lbl">Test Cases</div></div>
  <div class="stat" style="background:#E1F5EE"><div class="stat-val" style="color:#0F6E56">${totalStreams}</div><div class="stat-lbl">Streams</div></div>
</div>

<h2 class="section-h">Projects</h2>
${projRows}

${streamSections}

<footer>
  Generated by Codebeamer ALM Demo Studio <strong>${esc(TOOL_VERSION)}</strong> — <a href="${esc(TOOL_REPO)}">${esc(TOOL_REPO)}</a>
  <br>
  Exported ${esc(new Date().toLocaleString())} from CB instance ${esc(cbUrl || "(unknown)")}.
</footer>
</body></html>`;
            };

            const exportSummaryHtml = () => {
              try {
                const html = buildExportHtml();
                const blob = new Blob([html], { type: "text/html;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `cb-demo-${(sessionPrefix || "summary").replace(/[^\w-]/g, "_")}-${fileTs(new Date())}.html`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
              } catch (e) {
                console.error("HTML export failed:", e);
                alert(`Export failed: ${e.message}`);
              }
            };

            // Print needs every project/stream expanded — the wizard
            // conditionally renders details, so CSS alone can't reveal them.
            // Flip summaryAllExpanded → wait for React to repaint → print →
            // restore the previous toggle state after the dialog closes.
            const printSummary = () => {
              const prevExpanded = summaryAllExpanded;
              setSummaryAllExpanded(true);
              setPrintAll(true);  // Force-render all three tabs (Projects/Streams/Lineage)
              setTimeout(() => {
                window.print();
                // window.print() blocks until the dialog is dismissed in most
                // browsers; restore after a tick so we don't snap closed
                // before the dialog renders.
                setTimeout(() => {
                  setSummaryAllExpanded(prevExpanded);
                  setPrintAll(false);
                }, 0);
              }, 150);
            };

            // Filter project_keys per tier ownership (matches createStream B-1 filter)
            const ownedProjectsForStream = (tierKey, stream) => {
              const own = { library_streams:["library"], product_line_streams:["library","product_line"], transform_streams:[], release_streams:["release"] }[tierKey] || [];
              return (stream.project_keys || []).filter(pk => {
                const p = struct.projects?.find(p => p.project_key === pk);
                return p && own.includes(p.category);
              });
            };

            const tsLabel = generatedAt ? generatedAt.toLocaleString(undefined, { year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit" }) : "";

            return (
            <div>
              {/* Header — title on the left, export actions top-right */}
              <div style={{ display:"flex", alignItems:"flex-start", gap:12, marginBottom:20 }}>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:20, fontWeight:600, color:"var(--text-primary)", marginBottom:4 }}>
                    Demo Summary: {struct.domain_name}
                  </div>
                  <div style={{ fontSize:12, color:"var(--text-secondary)" }}>
                    {sessionPrefix && <>[{sessionPrefix}]  ·  </>}
                    {DRY_RUN ? "Dry Run" : "Live mode"}
                    {tsLabel && <>  ·  Created {tsLabel}</>}
                  </div>
                </div>
                <div className="no-print" style={{ display:"flex", gap:6, flexShrink:0 }}>
                  <button
                    style={{ ...smallBtnStyle(false), fontSize:11, padding:"5px 10px" }}
                    title="Save this summary as a self-contained HTML file"
                    onClick={exportSummaryHtml}>
                    ↓ Export HTML
                  </button>
                  <button
                    style={{ ...smallBtnStyle(false), fontSize:11, padding:"5px 10px" }}
                    title="Open the browser print dialog (use 'Save as PDF' for a PDF)"
                    onClick={printSummary}>
                    🖨 Print
                  </button>
                </div>
              </div>

              {/* Aborted-run banner */}
              {abortMode && (
                <div className="no-print" style={{ padding:"10px 14px", marginBottom:16, background:"#FEF2F2",
                  border:"1px solid #FECACA", borderRadius:8, fontSize:12, color:"#7F1D1D" }}>
                  <strong>Run aborted.</strong> Clean up the projects below, then click <em>Start New Demo</em> at the bottom to reset the wizard.
                </div>
              )}

              {/* Stat band */}
              <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:14 }}>
                <Stat value={struct.projects?.length || 0} label="Projects" color="#534AB7" />
                <Stat value={Object.values(reqCounts).reduce((a,c) => a + (c?.reqs||0), 0)} label="Requirements" color="#854F0B" />
                <Stat value={Object.values(reqCounts).reduce((a,c) => a + (c?.tcs||0), 0)} label="Test Cases" color="#185FA5" />
                <Stat value={TIERS.reduce((a,t) => a + (struct[t.key]||[]).length, 0)} label="Streams" color="#0F6E56" />
              </div>

              {/* Consolidated Step 4 control row — tabs (primary nav, PTC green active)
                  on the left, Expand/Collapse (secondary, neutral active) on the right.
                  Expand chip is hidden on the Lineage tab (no expand semantics there). */}
              <div className="no-print" style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:18, gap:12, flexWrap:"wrap" }}>
                {/* Tabs — primary navigation */}
                <div style={{ display:"inline-flex", padding:3, borderRadius:8, background:"var(--bg-secondary)", border:"1px solid var(--border-secondary)" }}>
                  {[
                    { v:"projects", label:"Projects" },
                    { v:"streams",  label:"Streams" },
                    { v:"lineage",  label:"Lineage" },
                  ].map(opt => (
                    <span key={opt.v}
                      onClick={() => setSummaryTab(opt.v)}
                      style={{
                        padding:"6px 18px", fontSize:12, fontWeight:500, borderRadius:6, cursor:"pointer",
                        background: summaryTab === opt.v ? "var(--accent)" : "transparent",
                        color: summaryTab === opt.v ? "#FFFFFF" : "var(--text-secondary)",
                      }}>
                      {opt.label}
                    </span>
                  ))}
                </div>

                {/* Expand/Collapse — secondary, only relevant for Projects/Streams */}
                {summaryTab !== "lineage" && (
                  <div style={{ display:"inline-flex", padding:3, borderRadius:8, background:"var(--bg-secondary)", border:"1px solid var(--border-secondary)" }}>
                    {[
                      { v:false, label:"▶  Collapsed" },
                      { v:true,  label:"▼  Expanded" },
                    ].map(opt => (
                      <span key={String(opt.v)}
                        onClick={() => setSummaryAllExpanded(opt.v)}
                        style={{
                          padding:"6px 14px", fontSize:12, fontWeight:500, borderRadius:6, cursor:"pointer",
                          background: summaryAllExpanded === opt.v ? "var(--bg-primary)" : "transparent",
                          color: summaryAllExpanded === opt.v ? "var(--text-primary)" : "var(--text-secondary)",
                          border: summaryAllExpanded === opt.v ? "1px solid var(--border-secondary)" : "1px solid transparent",
                        }}>
                        {opt.label}
                      </span>
                    ))}
                  </div>
                )}
              </div>

              {/* ── Projects tab ── */}
              {(summaryTab === "projects" || printAll) && (<>
              <div style={{ fontSize:14, fontWeight:600, marginBottom:8 }}>Projects</div>
              <div style={{ display:"flex", flexDirection:"column", gap:6, marginBottom:24 }}>
                {struct.projects.map((p, i) => {
                  const open = isOpen(`proj-${i}`);
                  const cat = p.category || "library";
                  const tier = cat === "release" ? TIERS[3] : cat === "product_line" ? TIERS[1] : TIERS[0];
                  const arts = projectArtifacts[i];
                  const counts = reqCounts[i];
                  return (
                    <div key={i} style={{ padding:"10px 14px", borderRadius:8, background:"var(--bg-primary)", border:"1px solid var(--border-secondary)" }}>
                      <div onClick={() => toggleOpen(`proj-${i}`)}
                        style={{ display:"flex", alignItems:"center", gap:10, cursor:"pointer" }}>
                        <span style={{ fontSize:9, color:"var(--text-secondary)", width:10 }}>{open ? "▼" : "▶"}</span>
                        <span style={{ width:8, height:8, borderRadius:"50%", background:tier.clr, flexShrink:0 }}></span>
                        <span style={{ fontSize:13, fontWeight:500, display:"flex", alignItems:"center", flex:1 }}>
                          {p.project_name}
                          <ExtLink href={cbProjectUrl(p.project_key)} title={`Open project ${p.project_key} in Codebeamer`} />
                        </span>
                        <span style={{ fontSize:10, fontWeight:500, color:tier.clr, padding:"2px 8px", borderRadius:4, background:tier.bg }}>
                          {cat === "product_line" ? "product line" : cat}
                        </span>
                        <span style={{ fontSize:11, fontWeight:500, fontFamily:"monospace", minWidth:80, textAlign:"right" }}>
                          {projectIds[i]
                            ? <IdLink href={cbProjectUrl(p.project_key)} label={`id ${projectIds[i]}`} />
                            : <span style={{ color:"var(--text-tertiary)" }}>—</span>}
                        </span>
                      </div>

                      {!open && counts && (
                        <div style={{ fontSize:11, color:"var(--text-secondary)", marginTop:4, paddingLeft:28 }}>
                          {counts.reqs} requirements  ·  {counts.tcs} test cases  ·  {counts.verifies} verifies links
                        </div>
                      )}

                      {open && arts && (
                        <div style={{ marginTop:10, paddingLeft:22 }}>
                          {arts.reqs?.length > 0 && (
                            <div style={{ borderLeft:"2px solid var(--border-secondary)", paddingLeft:12, marginBottom:8 }}>
                              <div style={{ fontSize:10, fontWeight:600, color:"var(--text-tertiary)", letterSpacing:0.5, marginBottom:2 }}>
                                {arts.reqs.length} REQUIREMENTS
                              </div>
                              {arts.reqs.map((r, ri) => (
                                <div key={ri} style={{ display:"flex", alignItems:"center", gap:8, padding:"3px 0", fontSize:12 }}>
                                  <span style={{ flex:1 }}>{r.title}</span>
                                  <IdLink href={cbIssueUrl(r.id)} label={`id ${r.id}`} />
                                </div>
                              ))}
                            </div>
                          )}
                          {arts.tcs?.length > 0 && (
                            <div style={{ borderLeft:"2px solid var(--border-secondary)", paddingLeft:12 }}>
                              <div style={{ fontSize:10, fontWeight:600, color:"var(--text-tertiary)", letterSpacing:0.5, marginBottom:2 }}>
                                {arts.tcs.length} TEST CASES
                              </div>
                              {arts.tcs.map((t, ti) => (
                                <div key={ti} style={{ display:"flex", alignItems:"center", gap:8, padding:"3px 0", fontSize:12 }}>
                                  <span>{t.title}</span>
                                  <span style={{ color:"var(--text-tertiary)", fontSize:11 }}>
                                    verifies {t.verifies.map((rid, vi) => (
                                      <React.Fragment key={vi}>
                                        {vi > 0 && ", "}
                                        <a href={cbIssueUrl(rid)} target="_blank" rel="noopener noreferrer"
                                          onClick={(e) => e.stopPropagation()}
                                          style={{ color:"var(--text-tertiary)", textDecoration:"none", cursor:"pointer" }}
                                          onMouseEnter={(e) => { e.currentTarget.style.textDecoration = "underline"; }}
                                          onMouseLeave={(e) => { e.currentTarget.style.textDecoration = "none"; }}>
                                          {rid}
                                        </a>
                                      </React.Fragment>
                                    ))}
                                  </span>
                                  <span style={{ flex:1 }}></span>
                                  <IdLink href={cbIssueUrl(t.id)} label={`id ${t.id}`} />
                                </div>
                              ))}
                            </div>
                          )}
                          {!arts.reqs?.length && !arts.tcs?.length && (
                            <div style={{ fontSize:11, color:"var(--text-tertiary)", fontStyle:"italic" }}>
                              No requirements or test cases were created for this project.
                            </div>
                          )}
                        </div>
                      )}

                      {open && !arts && (
                        <div style={{ fontSize:11, color:"var(--text-tertiary)", fontStyle:"italic", marginTop:6, paddingLeft:28 }}>
                          Artifact details unavailable (project may have been resolved from a previous run).
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
              </>)}

              {/* ── Streams tab ── */}
              {(summaryTab === "streams" || printAll) && (<>
              {TIERS.map(tier => {
                const streams = struct[tier.key] || [];
                if (!streams.length) return null;
                return (
                  <div key={tier.key} style={{ marginBottom:18 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                      <span style={{ fontSize:14, fontWeight:600, color:"var(--text-primary)" }}>{tier.label}</span>
                      <span style={{ fontSize:13, color:"var(--text-tertiary)" }}>({streams.length})</span>
                    </div>
                    <div style={{ display:"flex", flexDirection:"column", gap:6 }}>
                      {streams.map((st, i) => {
                        const skey = `stream-${st.stream_key}`;
                        const open = isOpen(skey);
                        const ownedKeys = ownedProjectsForStream(tier.key, st);
                        const inheritedCount = (st.project_keys?.length || 0) - ownedKeys.length;
                        const sid = streamIds[st.stream_key];
                        const parentName = st.parent_stream_key ? streamNameByKey[st.parent_stream_key] : null;
                        // Per-tier summary line copy
                        let summary;
                        if (tier.key === "library_streams")
                          summary = `No parent — independent root  ·  ${ownedKeys.length} project${ownedKeys.length===1?"":"s"}`;
                        else if (tier.key === "product_line_streams")
                          summary = `No parent — independent root  ·  ${ownedKeys.length} project${ownedKeys.length===1?"":"s"}`;
                        else if (tier.key === "transform_streams")
                          summary = `Branched from ${parentName || "—"}  ·  mirrors ${inheritedCount} project${inheritedCount===1?"":"s"} via inheritance`;
                        else
                          summary = `Branched from ${parentName || "—"}  ·  inherits ${inheritedCount}  ·  ${ownedKeys.length} release-specific`;

                        return (
                          <div key={i} style={{ padding:"10px 14px", borderRadius:8, background:"var(--bg-primary)", border:"1px solid var(--border-secondary)", borderLeft:`3px solid ${tier.clr}` }}>
                            <div onClick={() => toggleOpen(skey)}
                              style={{ display:"flex", alignItems:"center", gap:10, cursor:"pointer" }}>
                              <span style={{ fontSize:9, color:"var(--text-secondary)", width:10 }}>{open ? "▼" : "▶"}</span>
                              <span style={{ fontSize:13, fontWeight:500, flex:1, display:"flex", alignItems:"center" }}>
                                {sessionPrefix && <span style={{ color:"var(--text-tertiary)", fontWeight:400 }}>[{sessionPrefix}] </span>}
                                {st.stream_name}
                                <ExtLink href={cbStreamUrl(sid)} title={`Open projects in stream ${sid} in Codebeamer`} />
                              </span>
                              <span style={{ fontSize:11, fontWeight:500, fontFamily:"monospace", minWidth:80, textAlign:"right" }}>
                                {sid
                                  ? <IdLink href={cbStreamUrl(sid)} label={`id ${sid}`} />
                                  : <span style={{ color:"var(--text-tertiary)" }}>—</span>}
                              </span>
                            </div>
                            <div style={{ fontSize:11, color:"var(--text-secondary)", marginTop:4, paddingLeft:22 }}>
                              {summary}
                            </div>
                            {open && ownedKeys.length > 0 && (
                              <div style={{ marginTop:8, paddingLeft:34 }}>
                                <div style={{ borderLeft:"2px solid var(--border-secondary)", paddingLeft:10 }}>
                                  {ownedKeys.map(pk => {
                                    const p = struct.projects?.find(pr => pr.project_key === pk);
                                    return (
                                      <div key={pk} style={{ display:"flex", alignItems:"center", gap:8, padding:"3px 0", fontSize:12 }}>
                                        <span style={{ flex:1, display:"flex", alignItems:"center" }}>
                                          {p?.project_name || pk}
                                          <ExtLink href={cbProjectUrl(pk)} title={`Open project ${pk} in Codebeamer`} />
                                        </span>
                                        <span style={{ color:"var(--text-tertiary)", fontSize:11 }}>
                                          source: {sourceLabelForProject(tier.key, st, pk)}
                                        </span>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
              </>)}

              {/* ── Lineage tab ── */}
              {(summaryTab === "lineage" || printAll) && (
                <LineageDiagram struct={struct} streamIds={streamIds} cbStreamUrl={cbStreamUrl} TIERS={TIERS} />
              )}

              {/* Next steps */}
              <div className="no-print" style={{ marginTop:6, padding:"12px 14px", background:"var(--bg-secondary)",
                borderRadius:8, borderLeft:"3px solid #1D9E75", fontSize:13, color:"var(--text-secondary)" }}>
                <div style={{ fontWeight:500, color:"#065F46", marginBottom:4 }}>Next steps in Codebeamer</div>
                <div>1. Navigate to ALM &gt; Streams and verify the hierarchy.</div>
                <div>2. Click a Library stream to see its branched projects.</div>
                <div>3. Edit a requirement in one stream — verify it is independent in other streams.</div>
                <div>4. Demo merge workflow: propagate changes between streams.</div>
              </div>

              {/* Cleanup panel — call after demo / before next run */}
              <div className="no-print" style={{ marginTop:20, padding:"12px 14px", background:"#FEF2F2",
                borderRadius:8, borderLeft:"3px solid #DC2626", fontSize:13, color:"var(--text-secondary)" }}>
                <div style={{ fontWeight:500, color:"#7F1D1D", marginBottom:6 }}>
                  Clean up this demo
                </div>
                <div style={{ marginBottom:8, fontSize:12 }}>
                  Projects in category <strong>"{cleanupCategory}"</strong> can be deleted via the CB v1 API.
                  Streams cannot be deleted (CB v3 limitation) — we'll list them so you can hide/clean them manually.
                </div>

                {!cleanupPreview && !cleanupResult && (
                  <button
                    style={cleanupBusy ? { ...smallBtnStyle(false), opacity:0.5, cursor:"not-allowed" } : smallBtnStyle(false)}
                    disabled={cleanupBusy || !cleanupCategory}
                    onClick={previewCleanup}>
                    {cleanupBusy ? "Scanning..." : "Preview cleanup"}
                  </button>
                )}

                {cleanupPreview && (
                  <div>
                    <div style={{ fontSize:12, marginBottom:6 }}>
                      Found <strong>{cleanupPreview.projects.length}</strong> project(s) in this category
                      {sessionPrefix && <> and <strong>{cleanupPreview.streams.length}</strong> stream(s) matching prefix <code>[{sessionPrefix}]</code></>}.
                    </div>
                    {cleanupPreview.projects.length > 0 && (
                      <details style={{ fontSize:11, marginBottom:6 }}>
                        <summary style={{ cursor:"pointer" }}>Projects ({cleanupPreview.projects.length})</summary>
                        <div style={{ paddingLeft:12, paddingTop:4 }}>
                          {cleanupPreview.projects.slice(0, 50).map(p =>
                            <div key={p.id}>· {p.name} (id {p.id})</div>
                          )}
                          {cleanupPreview.projects.length > 50 && <div>… and {cleanupPreview.projects.length - 50} more</div>}
                        </div>
                      </details>
                    )}
                    {cleanupPreview.streams.length > 0 && (
                      <details style={{ fontSize:11, marginBottom:8 }}>
                        <summary style={{ cursor:"pointer" }}>Streams matching prefix ({cleanupPreview.streams.length}) — manual cleanup required</summary>
                        <div style={{ paddingLeft:12, paddingTop:4 }}>
                          {cleanupPreview.streams.slice(0, 50).map(s =>
                            <div key={s.id}>· {s.name} (id {s.id})</div>
                          )}
                          {cleanupPreview.streams.length > 50 && <div>… and {cleanupPreview.streams.length - 50} more</div>}
                        </div>
                      </details>
                    )}
                    <div style={{ display:"flex", gap:8 }}>
                      <button
                        style={cleanupBusy || cleanupPreview.projects.length === 0
                          ? { ...smallBtnStyle(true), opacity:0.5, cursor:"not-allowed", background:"#DC2626", borderColor:"#DC2626" }
                          : { ...smallBtnStyle(true), background:"#DC2626", borderColor:"#DC2626" }}
                        disabled={cleanupBusy || cleanupPreview.projects.length === 0}
                        onClick={executeCleanup}>
                        {cleanupBusy ? "Deleting..." : `Delete ${cleanupPreview.projects.length} project(s)`}
                      </button>
                      <button style={smallBtnStyle(false)} disabled={cleanupBusy} onClick={() => setCleanupPreview(null)}>
                        Cancel
                      </button>
                    </div>
                  </div>
                )}

                {cleanupResult && (
                  <div style={{ fontSize:12 }}>
                    <strong>{cleanupResult.projects?.filter(p => p.deleted).length || 0}</strong> project(s) deleted
                    {cleanupResult.projects?.some(p => !p.deleted) &&
                      <>, <strong style={{ color:"#DC2626" }}>{cleanupResult.projects.filter(p => !p.deleted).length}</strong> failed</>}.
                    <button style={{ ...smallBtnStyle(false), marginLeft:10 }} onClick={() => setCleanupResult(null)}>
                      Dismiss
                    </button>
                  </div>
                )}
              </div>

              <button className="no-print" style={{...btnStyle(false), marginTop:16}} onClick={resetWizardState}>
                Start New Demo
              </button>
            </div>
            );
          })()}
          </>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
