<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codebeamer ALM Demo Studio</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <!-- PTC corporate font (Raleway) — Phase 1 brand layer -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ── PTC brand palette (June 2023 corporate template) ── */
      --ptc-green:  #40AA1D;  /* primary brand — CTAs, success, library tier */
      --ptc-forest: #26481F;  /* dark green — hover state on green */
      --ptc-navy:   #1D496E;  /* product line tier, secondary headings */
      --ptc-blue:   #197BC0;  /* links, release tier */
      --ptc-orange: #EB6D00;  /* warning accent (rare) */
      --ptc-slate:  #617480;  /* secondary text, transform tier */
      --ptc-dark:   #3D4647;  /* primary body text */
      --ptc-grey:   #C8C9C7;  /* borders, dividers */
      --ptc-white:  #FFFFFF;  /* background */

      /* ── Semantic tokens (mapped to PTC palette) ── */
      --bg-primary:      var(--ptc-white);
      --bg-secondary:    #F5F7F4;             /* faintly green-tinted off-white */
      --bg-tertiary:     #ECEEEB;             /* slightly cooler */
      --bg-danger:       #FFF5F5;
      --text-primary:    var(--ptc-dark);
      --text-secondary:  var(--ptc-slate);
      --text-tertiary:   var(--ptc-grey);
      --text-danger:     #C0392B;
      --border-primary:  var(--ptc-dark);
      --border-secondary: var(--ptc-grey);
      --border-tertiary:  #E5E7E4;
      --border-danger:   #F5C6CB;
      --font-sans:       "Raleway", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --accent:          var(--ptc-green);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex; justify-content: center;
      padding: 2rem 1rem;
    }
    #root { max-width: 740px; width: 100%; }

    /* ── Heartbeat animation for the Codebeamer logo while generating ── */
    /* Two quick pulses followed by a longer rest — mimics a cardiac rhythm.
       Applied via the .logo-pulse class only while the OpenAI generation is
       in flight. Reduced-motion users get a single gentle fade instead. */
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.16); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.16); }
      70%       { transform: scale(1); }
    }
    @keyframes logo-fade {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.55; }
    }
    .logo-pulse {
      animation: heartbeat 1.4s ease-in-out infinite;
      transform-origin: center center;
      will-change: transform;
    }
    @media (prefers-reduced-motion: reduce) {
      .logo-pulse { animation: logo-fade 1.6s ease-in-out infinite; }
    }

    /* ── Print stylesheet — only Step 4 Summary is printed ── */
    @media print {
      body { padding: 0; display: block; }
      #root { max-width: 100%; }
      /* Hide chrome that isn't part of the report */
      .no-print, .no-print * { display: none !important; }
      /* Force expanded view for everything */
      .print-expanded { display: block !important; }
      /* Defeat row hover/click affordances on print */
      [role="button"], button { cursor: default !important; }
      /* Page break hints */
      .print-section { page-break-inside: avoid; }
      a { color: #212529 !important; text-decoration: none !important; }
      a[href]:after { content: " (" attr(href) ")"; font-size: 9px; color: #6c757d; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ─── Tool version (shown in export footer for auditability) ──────────
    // Bump this with each significant release. Last commit short SHA is
    // included so an exported report can be traced to a code version.
    const TOOL_VERSION = "v4 · 2026-05-14 · commit e1aa85a";
    const TOOL_REPO = "https://github.com/samohan05/CB_STREAMS_DEMO_GENERATOR";

    // ─── Product Catalog ──────────────────────────────────────────────
    const PRODUCTS = [
      { id:"mri",  emoji:"🔬", label:"MRI Systems",        domain:"Magnetic Resonance Imaging (MRI) Systems",         industry:"Medical Device / Radiology" },
      { id:"us",   emoji:"🏥", label:"Ultrasound",          domain:"Diagnostic Ultrasound Imaging Systems",            industry:"Medical Device / Radiology" },
      { id:"ct",   emoji:"🫁", label:"CT Scanner",           domain:"Computed Tomography (CT) Scanner Systems",         industry:"Medical Device / Radiology" },
      { id:"igt",  emoji:"🩺", label:"Image-Guided Therapy", domain:"Image-Guided Therapy & Intervention Systems",      industry:"Medical Device / Interventional" },
      { id:"pm",   emoji:"📊", label:"Patient Monitoring",   domain:"Multi-Parameter Patient Monitoring Systems",       industry:"Medical Device / Critical Care" },
      { id:"rt",   emoji:"☢️", label:"Radiotherapy",         domain:"External Beam Radiation Therapy Delivery Systems", industry:"Medical Device / Oncology" },
      { id:"pace", emoji:"❤️", label:"Pacemakers",           domain:"Implantable Cardiac Rhythm Management Devices",    industry:"Medical Device / Cardiology" },
      { id:"adas", emoji:"🚗", label:"ADAS Systems",         domain:"Advanced Driver Assistance Systems (ADAS/AD)",     industry:"Automotive / Safety-Critical" },
    ];

    // Tier palette aligned to PTC June 2023 corporate brand:
    //   Library  → PTC green   #40AA1D  (source-of-truth tier earns brand primary)
    //   PL       → PTC navy    #1D496E  (platform stratum reads as "structural")
    //   Transform → PTC slate  #617480  (intermediate staging — neutral tone)
    //   Release  → PTC blue    #197BC0  (outcome / market-facing accent)
    const TIERS = [
      { key:"library_streams",      label:"Library Streams",      short:"LIB", clr:"#40AA1D", bg:"#E6F5E0" },
      { key:"product_line_streams", label:"Product Line Streams",  short:"PL",  clr:"#1D496E", bg:"#E4ECF3" },
      { key:"transform_streams",    label:"Transform Streams",     short:"TR",  clr:"#617480", bg:"#EBEEF0" },
      { key:"release_streams",      label:"Release Streams",       short:"REL", clr:"#197BC0", bg:"#E1EEFA" },
    ];

    // ─── Styles ───────────────────────────────────────────────────────
    const inputStyle = {
      width:"100%", boxSizing:"border-box", padding:"8px 10px",
      borderRadius:8, border:"1px solid var(--border-secondary)",
      background:"var(--bg-primary)", fontSize:13,
      color:"var(--text-primary)", fontFamily:"var(--font-sans)",
    };
    // Primary buttons now use PTC green per corporate brand (Phase 1 revamp).
    // Hover state darkens to forest (#26481F) — applied inline via the helper
    // since we keep inline styles only and don't introduce :hover stylesheets.
    const btnStyle = (primary) => ({
      padding:"9px 20px", borderRadius:8, fontSize:13, fontWeight:500,
      cursor:"pointer", border:`1px solid ${primary ? "var(--ptc-green)" : "var(--border-secondary)"}`,
      background: primary ? "var(--ptc-green)" : "var(--bg-primary)",
      color: primary ? "var(--ptc-white)" : "var(--text-primary)",
      fontFamily: "var(--font-sans)",
    });
    const btnDisabled = { ...btnStyle(true), opacity:0.35, cursor:"not-allowed" };
    const smallBtnStyle = (primary) => ({
      ...btnStyle(primary), padding:"6px 14px", fontSize:12,
    });

    // ─── JSON parser ──────────────────────────────────────────────────
    function sanitizeJson(raw) {
      let s = raw.trim().replace(/^\uFEFF/,'').replace(/^```json?\s*/im,'').replace(/\s*```\s*$/im,'');
      let out='', inStr=false, esc=false;
      for (let i=0;i<s.length;i++){
        const ch=s[i];
        if(esc){out+=ch;esc=false;continue}
        if(ch==='\\'){out+=ch;esc=true;continue}
        if(ch==='"'){out+=ch;inStr=!inStr;continue}
        if(inStr){
          if(ch==='\n')out+='\\n';
          else if(ch==='\r')out+='\\r';
          else if(ch==='\t')out+='\\t';
          else out+=ch;
        } else out+=ch;
      }
      return out;
    }
    function parseAIJson(raw) {
      const fix=s=>s.replace(/,(\s*[}\]])/g,'$1');
      const attempts=[
        ()=>JSON.parse(fix(sanitizeJson(raw))),
        ()=>{const m=sanitizeJson(raw).match(/\{[\s\S]*/);if(!m)throw 0;return JSON.parse(fix(m[0]))},
        ()=>{
          let s=fix(sanitizeJson(raw).match(/\{[\s\S]*/)?.[0]||'');
          let b=0,k=0,inS=false,e2=false;
          for(const ch of s){if(e2){e2=false;continue}if(ch==='\\'){e2=true;continue}if(ch==='"'){inS=!inS;continue}if(inS)continue;if(ch==='{')b++;else if(ch==='}')b--;if(ch==='[')k++;else if(ch===']')k--}
          if(inS)s+='"';while(k>0){s+=']';k--}while(b>0){s+='}';b--}
          return JSON.parse(fix(s));
        },
      ];
      for(const fn of attempts){try{return fn()}catch(_){}}
      throw new Error('JSON repair failed');
    }

    // ─── Step Progress Bar ────────────────────────────────────────────
    const STEP_LABELS = ["Product","Projects","Requirements","Streams","Summary"];
    function StepBar({ current }) {
      return (
        <div style={{ display:"flex", gap:2, marginBottom:24 }}>
          {STEP_LABELS.map((lbl,i) => (
            <div key={i} style={{ flex:1, textAlign:"center" }}>
              <div style={{
                height:4, borderRadius:2, marginBottom:5,
                // Completed steps fade to PTC green at 60%; active step is solid PTC green;
                // future steps stay neutral grey. Replaces the old black-active accent.
                background: i<current ? "rgba(64,170,29,0.55)" : i===current ? "var(--ptc-green)" : "var(--bg-tertiary)",
              }} />
              <span style={{ fontSize:11, fontWeight: i===current ? 600 : 400, color: i<=current ? "var(--text-secondary)" : "var(--text-tertiary)" }}>{lbl}</span>
            </div>
          ))}
        </div>
      );
    }

    function Stat({ value, label, color }) {
      return (
        <div style={{ textAlign:"center", padding:"10px 8px", borderRadius:8,
          border:"1px solid var(--border-tertiary)", background:"var(--bg-secondary)" }}>
          <div style={{ fontSize:20, fontWeight:600, color }}>{value}</div>
          <div style={{ fontSize:11, color:"var(--text-secondary)" }}>{label}</div>
        </div>
      );
    }

    function StatusBadge({ status }) {
      const cfg = {
        pending:  { bg:"var(--bg-tertiary)", color:"var(--text-tertiary)", text:"Pending" },
        creating: { bg:"#FEF3C7", color:"#92400E", text:"Creating..." },
        done:     { bg:"#D1FAE5", color:"#065F46", text:"Created" },
        error:    { bg:"#FEE2E2", color:"#991B1B", text:"Failed" },
      }[status] || { bg:"transparent", color:"var(--text-tertiary)", text:status };
      return (
        <span style={{ padding:"3px 10px", borderRadius:10, fontSize:11, fontWeight:500, background:cfg.bg, color:cfg.color }}>
          {cfg.text}
        </span>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // Phase 2 — MANAGEMENT VIEW
    // High-level industry showcase. No wizard chrome. Picks an industry
    // tile and flips to product view with the domain pre-selected.
    // ═══════════════════════════════════════════════════════════════════
    function ManagementView({ onPick, onSwitchToProduct }) {
      return (
        <div style={{ padding:"8px 0 24px 0" }}>
          {/* Hero — uses the wordmark asset, not the icon */}
          <div style={{
            textAlign:"center", padding:"32px 16px 24px",
            background:"linear-gradient(180deg, #F5F7F4 0%, #FFFFFF 100%)",
            borderRadius:12, border:"1px solid var(--border-tertiary)",
            marginBottom:24,
          }}>
            <img src="/assets/codebeamer-wordmark.png"
              onError={(e) => { e.currentTarget.style.display = "none"; }}
              alt="Codebeamer"
              style={{ height:44, width:"auto", marginBottom:14, maxWidth:"80%" }}
            />
            <div style={{ fontSize:22, fontWeight:600, color:"var(--text-primary)", marginBottom:8, lineHeight:1.3 }}>
              What does a Codebeamer ALM demo look like for your industry?
            </div>
            <div style={{ fontSize:14, color:"var(--text-secondary)", maxWidth:560, margin:"0 auto", lineHeight:1.6 }}>
              A consultant-led walkthrough of a live, domain-specific Codebeamer environment — projects, requirements, traceability, and a complete 4-tier stream hierarchy. Built around your industry&apos;s standards and compliance reality.
            </div>
          </div>

          <div style={{ fontSize:14, fontWeight:500, marginBottom:12, color:"var(--text-primary)" }}>
            Pick an industry to see a tailored demo:
          </div>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(4, 1fr)", gap:12, marginBottom:20 }}>
            {PRODUCTS.map(p => (
              <div key={p.id} onClick={() => onPick(p)}
                style={{
                  padding:"20px 14px", borderRadius:8, cursor:"pointer", textAlign:"center",
                  border:"1.5px solid var(--border-tertiary)",
                  background:"var(--bg-primary)",
                  transition:"all 0.15s ease",
                }}
                onMouseEnter={(e) => {
                  e.currentTarget.style.borderColor = "var(--ptc-green)";
                  e.currentTarget.style.background = "var(--bg-secondary)";
                }}
                onMouseLeave={(e) => {
                  e.currentTarget.style.borderColor = "var(--border-tertiary)";
                  e.currentTarget.style.background = "var(--bg-primary)";
                }}>
                <div style={{ fontSize:24, marginBottom:8 }}>{p.emoji}</div>
                <div style={{ fontSize:12, fontWeight:500, color:"var(--text-primary)" }}>{p.label}</div>
                <div style={{ fontSize:10, color:"var(--text-tertiary)", marginTop:4, lineHeight:1.3 }}>{p.industry}</div>
              </div>
            ))}
          </div>

          <div style={{
            textAlign:"center", marginTop:24, padding:"20px 16px",
            background:"var(--bg-secondary)", borderRadius:8, fontSize:13, color:"var(--text-secondary)",
          }}>
            Or skip the industry showcase and use the wizard directly:&nbsp;
            <span onClick={onSwitchToProduct}
              style={{ color:"var(--ptc-green)", fontWeight:600, cursor:"pointer" }}>
              Switch to Product view →
            </span>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // Phase 2 — LINEAGE DIAGRAM
    // Simple SVG four-column tree (Library | PL | Transform | Release).
    // Arrows only for stream-level parent_stream_key inheritance —
    // Library→PL is per-project (shown in the Streams tab, not here).
    // ═══════════════════════════════════════════════════════════════════
    function LineageDiagram({ struct, streamIds, cbStreamUrl, TIERS }) {
      if (!struct) return null;
      const boxWidth = 140, boxHeight = 36, vGap = 12, topMargin = 44, colGap = 40;
      const COLS = TIERS.map((t, i) => ({
        key: t.key, label: t.label, clr: t.clr, bg: t.bg,
        x: 30 + i * (boxWidth + colGap),
        streams: struct[t.key] || [],
      }));
      const maxStreams = Math.max(...COLS.map(c => c.streams.length), 1);
      const svgHeight = topMargin + maxStreams * (boxHeight + vGap) + 16;
      const svgWidth = 30 + TIERS.length * (boxWidth + colGap) - colGap + 30;

      // Compute box positions (vertically centered per column)
      const layoutByKey = {};
      COLS.forEach(col => {
        const colHeight = col.streams.length * (boxHeight + vGap);
        const totalHeight = maxStreams * (boxHeight + vGap);
        const startY = topMargin + (totalHeight - colHeight) / 2;
        col.streams.forEach((s, i) => {
          layoutByKey[s.stream_key] = {
            x: col.x, y: startY + i * (boxHeight + vGap),
            clr: col.clr, bg: col.bg,
          };
        });
      });

      // Compute arrows for stream-level inheritance (Transform→PL, Release→Transform)
      const arrows = [];
      for (const t of TIERS) {
        for (const s of (struct[t.key] || [])) {
          if (s.parent_stream_key && layoutByKey[s.parent_stream_key]) {
            const parent = layoutByKey[s.parent_stream_key];
            const child = layoutByKey[s.stream_key];
            arrows.push({
              x1: parent.x + boxWidth, y1: parent.y + boxHeight/2,
              x2: child.x, y2: child.y + boxHeight/2,
            });
          }
        }
      }

      if (COLS.every(c => c.streams.length === 0)) {
        return <div style={{ padding:24, textAlign:"center", color:"var(--text-tertiary)", fontSize:13 }}>
          No streams defined in the generated structure yet.
        </div>;
      }

      // Brand-token color resolution for SVG. Reads at render time so
      // dark-mode (if added later) and any token re-theme propagate here too.
      const RALEWAY_STACK = "Raleway, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
      const hasAnySid = Object.values(streamIds || {}).some(Boolean);

      return (
        <div style={{ overflowX:"auto", padding:"4px 0 8px", color:"var(--text-tertiary)" }}>
          <svg width={svgWidth} height={svgHeight} style={{ display:"block", margin:"0 auto", fontFamily: RALEWAY_STACK }}>
            <defs>
              {/* Arrow marker uses currentColor so the parent <div>'s text-tertiary
                  token drives both the polygon fill and the line stroke. */}
              <marker id="lineageArrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
                <polygon points="0 0, 8 4, 0 8" fill="currentColor" />
              </marker>
            </defs>
            {/* Column headers */}
            {COLS.map(col => (
              <text key={col.key} x={col.x + boxWidth/2} y={26} fontSize="10" fontWeight="600"
                textAnchor="middle" fill={col.clr} fontFamily={RALEWAY_STACK} style={{ letterSpacing:0.6 }}>
                {col.label.toUpperCase()}
              </text>
            ))}
            {/* Arrows behind boxes so they appear connected */}
            {arrows.map((a, i) => (
              <line key={i} x1={a.x1} y1={a.y1} x2={a.x2 - 4} y2={a.y2}
                stroke="currentColor" strokeWidth="1.5" markerEnd="url(#lineageArrow)" />
            ))}
            {/* Boxes */}
            {COLS.flatMap(col => col.streams.map(s => {
              const layout = layoutByKey[s.stream_key];
              const sid = streamIds[s.stream_key];
              const url = cbStreamUrl ? cbStreamUrl(sid) : null;
              const name = s.stream_name || s.stream_key;
              const truncated = name.length > 22 ? name.substring(0, 21) + "…" : name;
              const box = (
                <g key={s.stream_key} transform={`translate(${layout.x}, ${layout.y})`}>
                  {/* Native SVG tooltip — full untruncated stream name on hover */}
                  <title>{name}{sid ? ` · id ${sid}` : ""}</title>
                  <rect width={boxWidth} height={boxHeight} rx="6"
                    fill={layout.bg} stroke={layout.clr} strokeWidth="1.5" />
                  <text x={boxWidth/2} y={15} fontSize="10" textAnchor="middle"
                    fill={layout.clr} fontFamily={RALEWAY_STACK} fontWeight="600">{truncated}</text>
                  <text x={boxWidth/2} y={28} fontSize="9" textAnchor="middle"
                    fill="var(--text-tertiary)" fontFamily="ui-monospace, Consolas, monospace">{sid ? `id ${sid}` : "—"}</text>
                </g>
              );
              return url ? (
                <a key={s.stream_key} href={url} target="_blank" rel="noopener noreferrer"
                  style={{ cursor:"pointer" }}>{box}</a>
              ) : box;
            }))}
          </svg>
          <div style={{ fontSize:11, color:"var(--text-tertiary)", textAlign:"center", marginTop:6, fontStyle:"italic" }}>
            Arrows show stream-level inheritance (Transform → PL parent · Release → Transform parent).
            Library → PL lineage is per-project — see the Streams tab for per-project source mapping.
            {!hasAnySid && <> · <span style={{ color:"var(--ptc-orange)" }}>Dry run — IDs not yet assigned.</span></>}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════════════════════
    function App() {
      const [step, setStep] = useState(0);
      const [dryRun, setDryRun] = useState(true);
      // Alias for easy reference throughout
      const DRY_RUN = dryRun;

      // Phase 2 — view router: "management" (high-level industry showcase, no
      // Codebeamer wizard chrome) or "product" (the existing 5-step wizard).
      // Click on an industry tile from management view pre-selects the domain
      // and flips to product view at Step 0.
      const [view, setView] = useState("product");

      // Phase 2 — Step 4 tab structure: which group of summary content to show
      const [summaryTab, setSummaryTab] = useState("projects");

      // Phase 2 — when true, every Step 4 tab section renders simultaneously.
      // Flipped on during Print so all three tabs (Projects/Streams/Lineage)
      // appear in the printout / Save-as-PDF; restored after the dialog.
      const [printAll, setPrintAll] = useState(false);

      // Step 0: Product selection
      const [product, setProduct] = useState(null);
      const [customDomain, setCustomDomain] = useState("");
      const [customIndustry, setCustomIndustry] = useState("");

      // CB Connection (loaded from backend, editable)
      const [cbUrl, setCbUrl] = useState("");
      const [cbUser, setCbUser] = useState("");
      const [cbPass, setCbPass] = useState("");

      // OpenAI (always through backend proxy)
      const [backendHasKey, setBackendHasKey] = useState(false);
      const [useLocalProxy, setUseLocalProxy] = useState(true);
      const [openaiKey, setOpenaiKey] = useState("");

      // Data
      const [struct, setStruct] = useState(null);
      const [err, setErr] = useState("");
      const [generating, setGenerating] = useState(false);
      // Per-page in-flight guards for "Create All" buttons.
      // Prevents the user clicking twice and spawning parallel API trains.
      const [creatingAllProjects, setCreatingAllProjects] = useState(false);
      const [creatingAllReqs, setCreatingAllReqs] = useState(false);
      const [creatingAllStreams, setCreatingAllStreams] = useState(false);
      const [genStage, setGenStage] = useState("");

      // Project creation
      const [projectStatus, setProjectStatus] = useState({});
      const [projectIds, setProjectIds] = useState({});
      const [projectTrackers, setProjectTrackers] = useState({});
      const [projectErrors, setProjectErrors] = useState({});

      // Req/TC creation
      const [reqStatus, setReqStatus] = useState({});
      const [reqErrors, setReqErrors] = useState({});
      const [reqCounts, setReqCounts] = useState({});
      // Per-project artifact details for Summary v2 — { [projIdx]: { reqs: [{id, title}], tcs: [{id, title, verifies: [reqIds]}] } }
      const [projectArtifacts, setProjectArtifacts] = useState({});
      // Step 3 → Step 4 abort flow: when true, Step 4 shows an aborted-run banner.
      const [abortMode, setAbortMode] = useState(false);
      // Per-run timestamp captured at first AI generation, used in Summary header.
      const [generatedAt, setGeneratedAt] = useState(null);
      // Summary v2 — per-project / per-stream collapsed-state map
      const [summaryExpanded, setSummaryExpanded] = useState({}); // { 'proj-3': true, 'stream-LIB_X': true }
      const [summaryAllExpanded, setSummaryAllExpanded] = useState(false);

      // Stream creation

      const generateProjects = async () => {

            throw new Error(msg);

              return cleaned.slice(0, 5) || "PROJ";

              // value back to struct.projects[i].project_key — but the stream

              // findIndex() lookup later in createStream returned -1 and the
              // project was silently dropped from the stream. Truncate here at
              // parse time and propagate via keyRemap so EVERY reference stays
              // consistent.
              if (candidate.length > 8) candidate = candidate.slice(0, 8);

              const isPlaceholder = !original || placeholderRe.test(original);
              const isDup = seen.has(candidate);
              if (isPlaceholder || isDup) {
                const base = abbreviate(p.project_name);
                candidate = (base + sessionStamp).slice(0, 8);
                let ix = 1;
                while (seen.has(candidate)) {
                  const suffix = sessionStamp + String.fromCharCode(64 + (++ix));
                  candidate = (base.slice(0, 8 - suffix.length) + suffix).slice(0, 8);
                }
              }
              seen.add(candidate);
              if (candidate !== original) {
                keyRemap[original] = candidate;
                console.log(`Remapped project_key "${original}" → "${candidate}" (${p.project_name})`);
              }
              p.project_key = candidate;
            }
            // Propagate remapped keys into stream.project_keys arrays
            for (const tier of ["library_streams", "product_line_streams", "transform_streams", "release_streams"]) {
              for (const st of (parsed[tier] || [])) {
                st.project_keys = (st.project_keys || []).map(k => keyRemap[k.toUpperCase()] || k);
              }
            }
          }

          // ── Orphaned library project rescuer ─────────────────────────
          // The AI sometimes produces library_streams with fewer
          // project_keys than there are library-category projects,
          // leaving one or more projects orphaned (no library stream
          // references them). They then don't appear in any library
          // stream's Step 3 tile, and only land in PL streams via the
          // wizard's fallback source = initialStream. Auto-assign each
          // orphan to the library stream with the fewest projects so
          // they're discoverable and the libraries stay balanced.
          // Per architect direction: use an EXISTING library stream;
          // never invent a "Misc Library".
          {
            const libProjects = parsed.projects.filter(p => p.category === "library");
            const libStreams = parsed.library_streams || [];
            if (libStreams.length > 0) {
              const referenced = new Set();
              for (const ls of libStreams) {
                for (const k of (ls.project_keys || [])) referenced.add(k);
              }
              const orphans = libProjects.filter(p => !referenced.has(p.project_key));
              for (const orphan of orphans) {
                // Pick library stream with fewest projects (deterministic
                // tie-breaker: first match wins).
                let target = libStreams[0];
                for (const ls of libStreams) {
                  if ((ls.project_keys || []).length < (target.project_keys || []).length) {
                    target = ls;
                  }
                }
                target.project_keys = [...(target.project_keys || []), orphan.project_key];
                console.warn(`Orphaned library project "${orphan.project_name}" (key ${orphan.project_key}) — auto-assigned to library stream "${target.stream_name}".`);
              }
            }
          }

          // Auto-add PL projects to their PL stream's project_keys
          for (const plp of (parsed.pl_projects || [])) {
            const plStream = (parsed.product_line_streams || []).find(s => s.stream_key === plp.stream_key);
            if (plStream && !plStream.project_keys.includes(plp.project_key)) {
              plStream.project_keys.push(plp.project_key);
            }
          }

          // Auto-add release projects to their release stream's project_keys
          for (const rlp of (parsed.release_projects || [])) {
            const relStream = (parsed.release_streams || []).find(s => s.stream_key === rlp.stream_key);
            if (relStream && !relStream.project_keys.includes(rlp.project_key)) {
              relStream.project_keys.push(rlp.project_key);
            }
          }

          // ── Per-product Transform model ─────────────────────────────
          // Each release product gets its OWN Transform (1:1), branched from
          // the PL the release belongs to. Transform name = "Transform for
          // <release product name>". Defensive normalization here so that
          // even if the AI emits the older PL-aligned shape (1 Transform per
          // PL), we synthesize per-release Transforms before stream creation.
          const libKeys = parsed.projects.filter(p => p.category === "library").map(p => p.project_key);
          const releaseStreams = parsed.release_streams || [];

          // Build a lookup: release.stream_key → its current parent_stream_key (which the AI
          // may have set to either an old shared TR_ key or directly to a PL — we ignore both).
          // The release's TRUE parent PL is determined via the release_project's stream_key
          // matching a release_stream, which inherited it from the user's choice on Step 0
          // OR from the AI's pl_projects mapping. As a robust fallback we use the
          // release_stream's own pre-existing parent if it points to a known PL or Transform.
          const plKeys = new Set((parsed.product_line_streams || []).map(s => s.stream_key));

          // Resolve each release's PL parent. Strategy:
          //   1. If release.parent_stream_key already points to a PL, use that.
          //   2. Else if it points to an existing Transform whose parent is a PL, use that PL.
          //   3. Else fall back to the first PL.
          const oldTransforms = parsed.transform_streams || [];
          const oldTransformByKey = {};
          for (const t of oldTransforms) oldTransformByKey[t.stream_key] = t;

          const resolveReleasePlKey = (rel) => {
            const pk = rel.parent_stream_key;
            if (pk && plKeys.has(pk)) return pk;
            const oldTr = pk ? oldTransformByKey[pk] : null;
            if (oldTr && plKeys.has(oldTr.parent_stream_key)) return oldTr.parent_stream_key;
            return (parsed.product_line_streams || [])[0]?.stream_key || null;
          };

          // Synthesize one Transform per release. Replaces parsed.transform_streams entirely.
          const newTransforms = releaseStreams.map((rel, idx) => {
            const plKey = resolveReleasePlKey(rel);
            const trKey = `TR_${(rel.stream_key || `REL${idx}`).replace(/^REL_?/, "")}`;
            return {
              stream_key: trKey,
              stream_name: `Transform for ${rel.stream_name}`,
              description: `Parameter-substitution staging area for ${rel.stream_name}`,
              project_keys: [...libKeys],          // full mirror of parent PL's library projects
              parent_stream_key: plKey,            // branches off the PL
              release_stream_key: rel.stream_key,  // 1:1 link to the release it feeds
            };
          });
          parsed.transform_streams = newTransforms;

          // Re-wire each release to point at its dedicated Transform.
          for (let i = 0; i < releaseStreams.length; i++) {
            releaseStreams[i].parent_stream_key = newTransforms[i].stream_key;
          }

          // Compute release.project_keys = library mirror + the release's own release-projects
          for (const rel of releaseStreams) {
            const relProjKeys = (rel.project_keys || []).filter(k =>
              parsed.projects.some(p => p.project_key === k && p.category === "release")
            );
            rel.project_keys = [...libKeys, ...relProjKeys];
          }

          setStruct(parsed);
          setGeneratedAt(new Date());
          setProjectArtifacts({});
          setSummaryExpanded({});
          setSummaryAllExpanded(false);
          setAbortMode(false);
          setProjectStatus({});
          setProjectIds({});
          setProjectTrackers({});
          setProjectErrors({});
          setReqStatus({});
          setReqErrors({});
          setReqCounts({});
          setStreamStatus({});
          setStreamIds({});
          streamIdsRef.current = {};
          setStreamErrors({});
          setStep(1);
        } catch(e) {
          setErr(e.message);
        } finally {
          setGenerating(false);
          setGenStage("");
        }
      };

      // ── CB API Helpers (through local proxy) ─────────────────────────
      const cbFetch = async (method, path, body = null) => {
        const url = `/api/cb/v3/${path.replace(/^\/cb\/api\/v3\//, "").replace(/^\//, "")}`;
        const opts = {
          method,
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
        };
        if (body) opts.body = JSON.stringify(body);
        const r = await fetch(url, opts);
        if (!r.ok) {
          let detail = "";
          try { detail = await r.text(); } catch(_) {}
          throw new Error(`${r.status}: ${detail.substring(0, 300)}`);
        }
        const text = await r.text();
        return text ? JSON.parse(text) : null;
      };
      const cbGet   = (path) => cbFetch("GET", path);
      const cbPost  = (path, body) => cbFetch("POST", path, body);
      const cbPut   = (path, body) => cbFetch("PUT", path, body);
      const cbPatch = (path, body) => cbFetch("PATCH", path, body);

      const cbFetchV1 = async (method, path, body = null) => {
        const url = `/api/cb/v1/${path.replace(/^\//, "")}`;
        const opts = {
          method,
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
        };
        if (body) opts.body = JSON.stringify(body);
        const r = await fetch(url, opts);
        if (!r.ok) {
          let detail = "";
          try { detail = await r.text(); } catch(_) {}
          throw new Error(`${r.status}: ${detail.substring(0, 300)}`);
        }
        const text = await r.text();
        return text ? JSON.parse(text) : null;
      };
      const cbGetV1  = (path) => cbFetchV1("GET", path);
      const cbPostV1 = (path, body) => cbFetchV1("POST", path, body);

      // ── Project creation ─────────────────────────────────────────────
      const categoryNameIntent = domain || "Demo"; // what the user/template asked for
      const categoryCreated = useRef(false);
      // cbCategoryNameRef declared earlier (near cleanup state, line ~248) —
      // CB sanitizes special chars in category names ("ADAS/AD" → "ADAS-AD").
      // After ensureCategoryExists, this ref holds CB's canonical name and
      // is used by project POSTs, listing queries, and the cleanup panel.
      const effectiveCategoryName = () => cbCategoryNameRef.current || categoryNameIntent;
      // Backwards-compat alias for callers that still want a synchronous read
      const categoryName = effectiveCategoryName();

      const ensureCategoryExists = async () => {
        if (categoryCreated.current || DRY_RUN) return;
        try {
          const catResp = await fetch("/api/cb/api/projects/category", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify({ categoryName: categoryNameIntent }),
          });
          if (catResp.ok) {
            const body = await catResp.json();
            console.log("Category pre-created:", body);
            // CB returns the SANITIZED canonical name in body.name — capture it.
            if (body && typeof body.name === "string" && body.name) {
              cbCategoryNameRef.current = body.name;
              if (body.name !== categoryNameIntent) {
                console.warn(`CB sanitized category "${categoryNameIntent}" → "${body.name}". Using CB's canonical name for project POSTs and cleanup.`);
              }
            }
          } else {
            const text = await catResp.text();
            console.log("Category pre-creation response:", catResp.status, text);
            // Try to parse — CB sometimes returns the existing category on 4xx.
            try {
              const body = JSON.parse(text);
              if (body && typeof body.name === "string") cbCategoryNameRef.current = body.name;
            } catch(_) {}
          }
          categoryCreated.current = true;
          // Wait for CB to finish provisioning the category
          await new Promise(r => setTimeout(r, 5000));
        } catch(e) {
          console.warn("Category pre-creation failed (continuing):", e.message);
          categoryCreated.current = true; // Don't retry on every project
        }
      };

      // Resolve trackers (req, TC, Verifies field) for a given project ID
      const resolveProjectTrackers = async (pid, idx) => {
        const trackers = await cbGet(`projects/${pid}/trackers`);
        const trackerList = Array.isArray(trackers) ? trackers : (trackers?.trackers || trackers?.items || []);

        let reqTrackerId = null, tcTrackerId = null;
        let reqTrackerName = "", tcTrackerName = "";
        let fallbackReqId = null, fallbackReqName = "";

        for (const t of trackerList) {
          const name = (t.name || "").toLowerCase();
          if (name.includes("system") && name.includes("requirement")) {
            reqTrackerId = t.id; reqTrackerName = t.name;
          }
          if (name.includes("requirement") && !fallbackReqId) {
            fallbackReqId = t.id; fallbackReqName = t.name;
          }
          if (name.includes("test") && name.includes("case") && !tcTrackerId) {
            tcTrackerId = t.id; tcTrackerName = t.name;
          }
        }
        if (!reqTrackerId && fallbackReqId) {
          reqTrackerId = fallbackReqId; reqTrackerName = fallbackReqName;
        }

        let verifiesFieldId = null;
        if (tcTrackerId) {
          try {
            const schema = await cbGet(`trackers/${tcTrackerId}/schema`);
            const fields = schema?.fields || (Array.isArray(schema) ? schema : []);
            for (const f of fields) {
              const fn = (f.name || "").toLowerCase();
              if (fn === "verifies" || fn.includes("verifies")) {
                verifiesFieldId = f.id || f.fieldId; break;
              }
            }
          } catch(_) {}
        }

        setProjectIds(prev => ({ ...prev, [idx]: pid }));
        setProjectTrackers(prev => ({ ...prev, [idx]: {
          reqTrackerId, tcTrackerId, verifiesFieldId, reqTrackerName, tcTrackerName
        }}));
        setProjectStatus(prev => ({ ...prev, [idx]: "done" }));
      };

      // Helper: fetch all projects in the category from CB
      const fetchCategoryProjects = async () => {
        try {
          // Use CB's canonical category name (set after ensureCategoryExists)
          // — CB sanitizes special chars, so the wizard's intent string may
          // not match what CB stored.
          const cat = effectiveCategoryName();
          const cbProjects = await cbGetV1(
            `projects/page/1?pagesize=500&category=${encodeURIComponent(cat)}`
          );
          const projectList = cbProjects?.projects || cbProjects || [];
          return Array.isArray(projectList) ? projectList : [];
        } catch(e) {
          console.warn("fetchCategoryProjects failed:", e.message);
          return [];
        }
      };

      // Helper: find project by name in CB
      const findProjectInCB = async (projectName) => {
        const list = await fetchCategoryProjects();
        for (const p of list) {
          if ((p.name || "").toLowerCase() === projectName.toLowerCase()) {
            return p.id || (p.uri ? parseInt(p.uri.split("/").pop()) : null);
          }
        }
        return null;
      };

      // Helper: generate a unique project key that doesn't conflict with existing CB projects
      const makeUniqueKey = async (baseKey) => {
        // Fetch all existing projects to check for key conflicts
        // CB v1 project list doesn't always return keyName, so we check by trying
        // First, just try the base key truncated to 8 chars
        const key = baseKey.substring(0, 8).toUpperCase();
        // Try the key — if POST fails with "same name", we'll get a conflict
        // Generate a unique key with a timestamp suffix
        const suffix = Date.now().toString(36).slice(-3).toUpperCase(); // 3-char alphanumeric
        const uniqueKey = (key.substring(0, 5) + suffix).substring(0, 8);
        return uniqueKey;
      };

      const createProject = async (idx) => {
        const p = struct.projects[idx];
        setProjectStatus(prev => ({ ...prev, [idx]: "creating" }));
        setProjectErrors(prev => { const n = {...prev}; delete n[idx]; return n; });

        if (DRY_RUN) {
          await new Promise(r => setTimeout(r, 300));
          const fakePid = 10000 + idx;
          setProjectIds(prev => ({ ...prev, [idx]: fakePid }));
          setProjectTrackers(prev => ({ ...prev, [idx]: {
            reqTrackerId: 20000 + idx, tcTrackerId: 30000 + idx, verifiesFieldId: 9999,
            reqTrackerName: "System Requirement Specification", tcTrackerName: "Test Cases"
          }}));
          setProjectStatus(prev => ({ ...prev, [idx]: "done" }));
          return;
        }

        try {
          // Ensure category exists before first project creation
          await ensureCategoryExists();

          // Step 1: Check if project already exists in CB (from a previous run)
          const existingPid = await findProjectInCB(p.project_name);
          if (existingPid) {
            console.log(`Project "${p.project_name}" already exists (ID: ${existingPid}), resolving trackers...`);
            setProjectErrors(prev => ({ ...prev, [idx]: `Already exists (ID: ${existingPid}), resolving...` }));
            await resolveProjectTrackers(existingPid, idx);
            setProjectErrors(prev => { const n = {...prev}; delete n[idx]; return n; });
            return;
          }

          // Step 2: Try to create project. CB rejects duplicates on TWO axes:
          //   - name collision  → "Project is under creation with the same name" (lock persists across retries)
          //   - key  collision  → "keyName already exists"
          // We detect which axis CB is complaining about and rotate ONLY that field.
          // The other field is preserved so user-edited values (from the UI) survive retries.
          const MAX_RETRIES = 3;
          const RETRY_DELAY = 10000;
          let pid = null;
          let currentKey = p.project_key.substring(0, 8);
          let currentName = p.project_name;

          for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
            const projectBody = {
              name: currentName,
              keyName: currentKey,
              description: p.description || currentName,
              // Use CB's canonical category name (CB sanitizes special chars
              // like "/" → "-", and project POSTs must use the stored name
              // exactly or the project goes to Uncategorized).
              category: effectiveCategoryName(),
            };

            try {
              setProjectErrors(prev => ({
                ...prev,
                [idx]: attempt > 0
                  ? `Retrying with name "${currentName}" / key "${currentKey}" (${attempt + 1}/${MAX_RETRIES + 1})`
                  : "Creating..."
              }));
              const result = await cbPostV1("project", projectBody);
              pid = result?.id || (result?.uri ? parseInt(result.uri.split("/").pop()) : null);
              if (pid) {
                // Persist the actually-used name/key back to the struct so the rest of
                // the wizard (req creation, summary) shows what's in CB, not what the AI proposed.
                if (currentName !== p.project_name || currentKey !== p.project_key) {
                  updateStruct(s => {
                    s.projects[idx].project_name = currentName;
                    s.projects[idx].project_key = currentKey;
                  });
                }
                break;
              }
            } catch(e) {
              const msg = (e.message || "").toLowerCase();
              const isNameConflict = msg.includes("same name") || msg.includes("name already") || msg.includes("under creation");
              const isKeyConflict  = msg.includes("keyname") || msg.includes("key already") || msg.includes("same key");
              const isGeneric409   = msg.includes("already exists") || msg.includes("409");
              if (!isNameConflict && !isKeyConflict && !isGeneric409) throw e;

              console.log(`Project "${currentName}" key "${currentKey}" — CB conflict (attempt ${attempt + 1}/${MAX_RETRIES + 1}): ${e.message}`);

              // CB might have actually created it despite the 4xx — check before retrying
              await new Promise(r => setTimeout(r, 5000));
              const foundPid = await findProjectInCB(currentName);
              if (foundPid) {
                console.log(`Project "${currentName}" found in CB after conflict (ID: ${foundPid})`);
                pid = foundPid;
                break;
              }

              if (attempt < MAX_RETRIES) {
                // Rotate the field that CB complained about. If CB only said "under
                // creation" without distinguishing, treat as name conflict (most common).
                const suffix = Date.now().toString(36).slice(-3).toUpperCase();
                if (isKeyConflict && !isNameConflict) {
                  currentKey = (p.project_key.substring(0, 5) + suffix).substring(0, 8);
                  console.log(`Rotating key to "${currentKey}"`);
                } else {
                  // Name conflict (or generic) — append a numeric suffix (n) to the name
                  currentName = `${p.project_name} (${attempt + 2})`;
                  console.log(`Rotating name to "${currentName}"`);
                }
                setProjectErrors(prev => ({
                  ...prev,
                  [idx]: `CB rejected: "${e.message.slice(0, 80)}". Retrying as "${currentName}" / "${currentKey}" in ${RETRY_DELAY/1000}s...`
                }));
                await new Promise(r => setTimeout(r, RETRY_DELAY));
              } else {
                throw new Error(`CB rejected ${MAX_RETRIES + 1} attempts. Last error: ${e.message}`);
              }
            }
          }

          if (!pid) throw new Error("No project ID returned from CB");

          // Step 3: Resolve trackers
          setProjectErrors(prev => ({ ...prev, [idx]: "Resolving trackers..." }));
          await resolveProjectTrackers(pid, idx);
          setProjectErrors(prev => { const n = {...prev}; delete n[idx]; return n; });

        } catch(e) {
          setProjectStatus(prev => ({ ...prev, [idx]: "error" }));
          setProjectErrors(prev => ({ ...prev, [idx]: e.message }));
        }
      };

      const createAllProjects = async () => {
        if (creatingAllProjects) return; // guard against double-click
        setCreatingAllProjects(true);
        try {
          // Category pre-creation is handled automatically by ensureCategoryExists()
          // inside createProject() — runs once on first project, then skips.

          // Create projects sequentially with 10s delay between each.
          // CB needs time to finish background provisioning (trackers, templates)
          // before accepting the next project creation.
          const pending = struct.projects
            .map((_, i) => i)
            .filter(i => projectStatus[i] !== "done");
          for (let pi = 0; pi < pending.length; pi++) {
            if (pi > 0) await new Promise(r => setTimeout(r, 10000));
            await createProject(pending[pi]);
          }
        } finally {
          setCreatingAllProjects(false);
        }
      };

      const allProjectsCreated = struct?.projects?.length > 0 &&
        struct.projects.every((_, i) => projectStatus[i] === "done");

      // ── Validate & resolve all projects before proceeding ───────────
      const [validating, setValidating] = useState(false);

      const validateAndProceed = async (nextStep) => {
        if (DRY_RUN) { setStep(nextStep); return; }
        if (allProjectsCreated) { setStep(nextStep); return; }

        setValidating(true);
        try {
          // Fetch all projects in this category from CB (use CB's canonical name)
          const cbProjects = await cbGetV1(`projects/page/1?pagesize=500&category=${encodeURIComponent(effectiveCategoryName())}`);
          const projectList = cbProjects?.projects || cbProjects || [];

          // Build a lookup by project name for matching
          const cbByName = {};
          for (const p of (Array.isArray(projectList) ? projectList : [])) {
            const name = p.name || "";
            cbByName[name.toLowerCase()] = p;
          }

          const missing = [];
          for (let i = 0; i < struct.projects.length; i++) {
            // Already resolved — skip
            if (projectStatus[i] === "done" && projectIds[i]) continue;

            const p = struct.projects[i];
            const match = cbByName[p.project_name.toLowerCase()];

            if (!match) {
              missing.push(p.project_name);
              continue;
            }

            const pid = match.id || (match.uri ? parseInt(match.uri.split("/").pop()) : null);
            if (!pid) { missing.push(p.project_name); continue; }

            // Resolve trackers for this project
            try {
              await resolveProjectTrackers(pid, i);
            } catch(e) {
              console.warn(`Failed to resolve trackers for ${p.project_name}:`, e.message);
              missing.push(p.project_name);
            }
          }

          if (missing.length > 0) {
            alert(`Create all projects before proceeding. Missing projects:\n\n${missing.join("\n")}`);
          } else {
            setStep(nextStep);
          }
        } catch(e) {
          alert(`Validation failed: ${e.message}`);
        } finally {
          setValidating(false);
        }
      };

      // ── Requirement & TC creation ────────────────────────────────────
      const createTrackerItems = async (idx) => {
        setReqStatus(prev => ({ ...prev, [idx]: "creating" }));
        setReqErrors(prev => { const n = {...prev}; delete n[idx]; return n; });
        const p = struct.projects[idx];
        const trackers = projectTrackers[idx];
        const pid = projectIds[idx];

        if (DRY_RUN) {
          await new Promise(r => setTimeout(r, 300));
          const reqs = p.requirements || [];
          // TC grouping: TC1 covers reqs 0-2, TC2 covers reqs 3+
          const tcCount = reqs.length > 0 ? (reqs.length <= 3 ? 1 : 2) : 0;
          const totalTCs = reqs.reduce((sum, req) => sum + (req.test_cases?.length || 0), 0);
          setReqCounts(prev => ({ ...prev, [idx]: { reqs: reqs.length, tcs: Math.max(tcCount, totalTCs), verifies: reqs.length } }));
          setReqStatus(prev => ({ ...prev, [idx]: "done" }));
          return;
        }

        if (!trackers?.reqTrackerId || !trackers?.tcTrackerId) {
          setReqStatus(prev => ({ ...prev, [idx]: "error" }));
          setReqErrors(prev => ({ ...prev, [idx]: `Missing tracker IDs. Found: Req=${trackers?.reqTrackerName || "none"}, TC=${trackers?.tcTrackerName || "none"}` }));
          return;
        }

        try {
          let reqCount = 0, tcCount = 0, verifyCount = 0;
          const reqs = p.requirements || [];
          const reqIds = [];
          // Per-project artifact details for Summary v2
          const reqDetails = [];   // [{id, title}]
          const tcDetails = [];    // [{id, title, verifies: [reqIds]}]

          for (const req of reqs) {
            const r = await cbPost(`trackers/${trackers.reqTrackerId}/items`, {
              name: req.title,
              description: req.description || "",
            });
            reqIds.push(r.id);
            reqDetails.push({ id: r.id, title: req.title });
            reqCount++;
          }

          const tcGroups = [reqIds.slice(0, 3), reqIds.slice(3)];
          for (const group of tcGroups) {
            if (group.length === 0) continue;
            const srcReqIdx = reqIds.indexOf(group[0]);
            const tcData = reqs[srcReqIdx]?.test_cases?.[0];
            if (!tcData) continue;

            const tc = await cbPost(`trackers/${trackers.tcTrackerId}/items`, {
              name: tcData.title,
              description: `${tcData.description || ""}\nSteps: ${tcData.steps || ""}\nExpected: ${tcData.expected_result || ""}`,
            });
            tcDetails.push({ id: tc.id, title: tcData.title, verifies: [...group] });
            tcCount++;

            // Set Verifies field — PUT /v3/items/{id}/fields with UpdateTrackerItemField body.
            // The earlier endpoint /v3/items/{id} with customFields triggered a CB 400
            // ("State transition from New to -- is not defined") because that endpoint
            // expects a full TrackerItem update; the field-level endpoint is the correct one.
            const verifiesId = trackers.verifiesFieldId;
            if (verifiesId && group.length > 0) {
              try {
                await cbPut(`items/${tc.id}/fields`, {
                  fieldValues: [{
                    fieldId: verifiesId,
                    name: "Verifies",
                    type: "ChoiceFieldValue",
                    values: group.map(reqId => ({ id: reqId, type: "TrackerItemReference" })),
                  }],
                });
                verifyCount += group.length;
              } catch(e) {
                console.warn(`Verifies link PUT failed for TC ${tc.id} -> Reqs [${group.join(",")}]:`, e.message);
              }
            } else {
              console.warn(`No Verifies field found for TC tracker ${trackers.tcTrackerId}. Skipping traceability links.`);
            }
          }

          setReqCounts(prev => ({ ...prev, [idx]: { reqs: reqCount, tcs: tcCount, verifies: verifyCount } }));
          setProjectArtifacts(prev => ({ ...prev, [idx]: { reqs: reqDetails, tcs: tcDetails } }));
          setReqStatus(prev => ({ ...prev, [idx]: "done" }));
        } catch(e) {
          setReqStatus(prev => ({ ...prev, [idx]: "error" }));
          setReqErrors(prev => ({ ...prev, [idx]: e.message }));
        }
      };

      const createAllReqs = async () => {
        if (creatingAllReqs) return; // guard against double-click
        setCreatingAllReqs(true);
        try {
          const pending = struct.projects
            .map((_, i) => i)
            .filter(i => reqStatus[i] !== "done");
          await Promise.allSettled(pending.map(i => createTrackerItems(i)));
        } finally {
          setCreatingAllReqs(false);
        }
      };

      const allReqsCreated = struct?.projects?.length > 0 &&
        struct.projects.every((_, i) => reqStatus[i] === "done");

      // ── Stream creation ──────────────────────────────────────────────
      useEffect(() => {
        if (step === 3 && !initialStreamId) {
          if (DRY_RUN) {
            setInitialStreamId(99999);
            return;
          }
          cbGet("streams/initial")
            .then(r => {
              const id = typeof r === "number" ? r : (r?.id || r?.streamId || r);
              setInitialStreamId(id);
            })
            .catch(() => {});
        }
      }, [step]);

      // Build a lookup: project_key -> library stream_key that contains it (memoized)
      const projectToLibraryMap = useMemo(() => {
        const map = {};
        for (const lib of (struct?.library_streams || [])) {
          for (const pk of (lib.project_keys || [])) {
            map[pk] = lib.stream_key;
          }
        }
        return map;
      }, [struct?.library_streams]);

      // Keep function form for backward compat in render code
      const getProjectToLibraryMap = () => projectToLibraryMap;

      // Get the source stream ID for a specific project being added to a stream.
      // Source is determined by the project's CATEGORY, not the tier alone.
      // Library and PL streams have NO sourceStreamId at creation (top-level),
      // so per-project source mapping carries the lineage:
      //   library project    → its library stream  (PL tier)  / initial (Library tier)
      //   product_line proj  → initial             (PL tier)
      //   release project    → initial             (Release tier)
      //   transform tier     → no PUTs at all (pure inheritance from PL parent)
      // Reads from streamIdsRef (synchronous) so this works mid-sequential-loop.
      const getSourceForProject = (tierKey, stream, projectKey) => {
        const ids = streamIdsRef.current;
        const proj = struct?.projects?.find(p => p.project_key === projectKey);
        const cat = proj?.category;

        if (tierKey === "library_streams") {
          // All library-tier projects come straight from initial.
          return initialStreamId;
        }
        if (tierKey === "product_line_streams") {
          if (cat === "library") {
            // Library project pulled into a PL stream — source from its library
            const libKey = projectToLibraryMap[projectKey];
            if (libKey && ids[libKey]) return ids[libKey];
            return initialStreamId; // fallback if library stream id not yet known
          }
          if (cat === "product_line") {
            // PL-specific project — source from initial
            return initialStreamId;
          }
          return null; // unknown category — skip
        }
        if (tierKey === "transform_streams") {
          // Transform is a pure mirror of its PL parent — no explicit project adds.
          return null;
        }
        if (tierKey === "release_streams") {
          if (cat === "release") {
            return initialStreamId;
          }
          // library/PL projects inherit through Transform — skip
          return null;
        }
        return null;
      };

      const createStream = async (tierKey, idx) => {
        const streams = struct[tierKey] || [];
        const st = streams[idx];
        const sKey = `${tierKey}_${idx}`;
        setStreamStatus(prev => ({ ...prev, [sKey]: "creating" }));
        setStreamProgress(prev => ({ ...prev, [sKey]: "Creating stream..." }));
        setStreamErrors(prev => { const n = {...prev}; delete n[sKey]; return n; });

        if (DRY_RUN) {
          await new Promise(r => setTimeout(r, 200));
          const fakeSid = 50000 + idx + (tierKey === "product_line_streams" ? 100 : tierKey === "transform_streams" ? 200 : tierKey === "release_streams" ? 300 : 0);
          setStreamIds(prev => ({ ...prev, [st.stream_key]: fakeSid }));
          setStreamStatus(prev => ({ ...prev, [sKey]: "done" }));
          setStreamProgress(prev => { const n = {...prev}; delete n[sKey]; return n; });
          return;
        }

        try {
          // Stream creation policy:
          //   Library → top-level, NO sourceStreamId (avoids inheriting all 101 initial-stream projects)
          //   PL      → top-level, NO sourceStreamId (lineage encoded per-project via PUT sourceStreamId)
          //   Transform → sourceStreamId = parent PL  (pure mirror)
          //   Release   → sourceStreamId = parent Transform  (release adds release-specific projects on top)
          // Read from streamIdsRef so this sees siblings created earlier in the same loop.
          const ids = streamIdsRef.current;
          let sourceId = null;
          if (tierKey === "transform_streams" || tierKey === "release_streams") {
            sourceId = st.parent_stream_key ? ids[st.parent_stream_key] : null;
          }
          // library_streams and product_line_streams: sourceId stays null

          const body = { name: prefixedStreamName(st.stream_name), color: "#336699", description: st.description || "" };
          if (sourceId) {
            body.sourceStreamId = sourceId;
            body.isSourceStreamChecked = true;
          }
          const result = await cbPost("streams/stream", body);
          const sid = result?.id;
          if (!sid) throw new Error("No stream ID in response");

          // Update both the ref (immediate) and the state (for re-render).
          streamIdsRef.current = { ...streamIdsRef.current, [st.stream_key]: sid };
          setStreamIds(prev => ({ ...prev, [st.stream_key]: sid }));
          setStreamProgress(prev => ({ ...prev, [sKey]: `Stream created (id ${sid}) — preparing projects...` }));

          // Which project categories does this tier explicitly add?
          //   library_streams      → ["library"]
          //   product_line_streams → ["library", "product_line"]   (both — library projects get added with their library as source)
          //   transform_streams    → []  (pure inherit from PL parent)
          //   release_streams      → ["release"]                   (library + PL projects inherit through Transform)
          const ownCategoriesByTier = {
            library_streams: ["library"],
            product_line_streams: ["library", "product_line"],
            transform_streams: [],
            release_streams: ["release"],
          };
          const ownCategories = ownCategoriesByTier[tierKey] || [];

          // Pre-compute the work list so progress can show "N of M".
          const workList = [];
          let skippedInherited = 0;
          for (const pk of (st.project_keys || [])) {
            const pidIdx = struct.projects.findIndex(p => p.project_key === pk);
            const proj = struct.projects[pidIdx];
            if (!proj || !ownCategories.includes(proj.category)) {
              skippedInherited++;
              continue;
            }
            const pid = projectIds[pidIdx];
            const projSourceId = getSourceForProject(tierKey, st, pk);
            if (pid && projSourceId) workList.push({ pk, pid, projSourceId });
          }

          if (workList.length === 0) {
            // Transform tier (or any tier with nothing to add) — pure inheritance.
            setStreamProgress(prev => ({ ...prev, [sKey]: `Stream created (id ${sid}). Mirroring ${skippedInherited} project(s) from parent stream.` }));
          }

          let addedCount = 0, failedCount = 0;
          for (let wi = 0; wi < workList.length; wi++) {
            const { pk, pid, projSourceId } = workList[wi];
            setStreamProgress(prev => ({
              ...prev,
              [sKey]: `Stream created (id ${sid}). Adding project ${wi + 1} of ${workList.length}: ${pk}...`,
            }));
            try {
              await cbPut(`streams/${sid}/projects`, {
                projectId: pid,
                sourceStreamId: projSourceId,
                addAllTrackers: true,
              });
              addedCount++;
            } catch(e) {
              failedCount++;
              console.warn(`Failed to add project ${pk} to stream ${st.stream_key}:`, e.message);
            }
          }
          if (skippedInherited > 0) {
            console.log(`[${st.stream_key}] added ${addedCount} own-tier project(s), inherited ${skippedInherited} via sourceStreamId`);
          }

          // Final summary — replaces the in-flight progress with a static success line.
          const summaryParts = [`Stream id ${sid}`];
          if (addedCount > 0) summaryParts.push(`${addedCount} project(s) added`);
          if (failedCount > 0) summaryParts.push(`${failedCount} failed`);
          if (skippedInherited > 0 && workList.length === 0) summaryParts.push(`${skippedInherited} inherited from parent`);
          setStreamProgress(prev => ({ ...prev, [sKey]: summaryParts.join(" · ") }));
          setStreamStatus(prev => ({ ...prev, [sKey]: "done" }));
        } catch(e) {
          setStreamStatus(prev => ({ ...prev, [sKey]: "error" }));
          setStreamProgress(prev => { const n = {...prev}; delete n[sKey]; return n; });
          setStreamErrors(prev => ({ ...prev, [sKey]: e.message }));
        }
      };

      const createAllStreams = async () => {
        if (creatingAllStreams) return; // guard against double-click
        setCreatingAllStreams(true);
        try {
          for (const tier of TIERS) {
            const streams = struct[tier.key] || [];
            for (let i = 0; i < streams.length; i++) {
              const sKey = `${tier.key}_${i}`;
              if (streamStatus[sKey] !== "done") {
                await createStream(tier.key, i);
              }
            }
          }
        } finally {
          setCreatingAllStreams(false);
        }
      };

      // ═══════════════════════════════════════════════════════════════
      // RENDER
      // ═══════════════════════════════════════════════════════════════
      return (
        <div style={{ padding:"0.5rem 0" }}>
          <div className="no-print" style={{ marginBottom:24 }}>
            {/* PTC logo lockup (Phase 1 brand layer) */}
            <div style={{ display:"flex", alignItems:"center", gap:12 }}>
              {/* Codebeamer logo — drop the actual file at assets/codebeamer-logo.png
                  and it will appear automatically. Until then, the onError handler
                  falls back to the PTC corporate mark so the header isn't empty.
                  The .logo-pulse class is applied only while AI generation is in
                  flight, giving a cardiac-rhythm heartbeat (see @keyframes heartbeat). */}
              <img
                src="/assets/codebeamer-logo.png"
                onError={(e) => { if (e.currentTarget.src.indexOf("ptc-logo") === -1) e.currentTarget.src = "/assets/ptc-logo.png"; }}
                alt="Codebeamer"
                className={generating ? "logo-pulse" : ""}
                style={{ height:28, width:"auto", display:"block" }}
              />
              <div style={{ display:"flex", alignItems:"center", gap:10, flex:1 }}>
                <div style={{ fontSize:20, fontWeight:600, color:"var(--text-primary)" }}>
                  Codebeamer ALM Demo Studio
                </div>
                {/* Version + deployment-mode chip — small, secondary tone. Not the headline. */}
                <span style={{
                  fontSize:10, fontWeight:500, padding:"2px 8px",
                  borderRadius:10, background:"var(--bg-tertiary)",
                  color:"var(--text-secondary)", letterSpacing:0.3,
                  whiteSpace:"nowrap",
                }}>
                  v4 · Local server
                </span>
              </div>
            </div>
            {/* Subtitle — three-arrow end-to-end story: input → AI → wizard output */}
            <div style={{ fontSize:13, color:"var(--text-secondary)", marginTop:6, lineHeight:1.5 }}>
              Pick a customer domain <span style={{ color:"var(--ptc-green)", fontWeight:600 }}>→</span> AI drafts the plan <span style={{ color:"var(--ptc-green)", fontWeight:600 }}>→</span> the wizard provisions a complete 4-tier stream hierarchy with projects, requirements, test cases, and traceability into your Codebeamer instance.
            </div>
            {/* Phase 2 — view router: segmented pill switches between the
                Management showcase landing page and the Product wizard. */}
            <div style={{ display:"flex", justifyContent:"flex-start", marginTop:12 }}>
              <div style={{ display:"inline-flex", padding:3, borderRadius:8, background:"var(--bg-secondary)", border:"1px solid var(--border-secondary)" }}>
                {[
                  { v:"management", label:"Management view" },
                  { v:"product",    label:"Product view" },
                ].map(opt => (
                  <span key={opt.v}
                    onClick={() => setView(opt.v)}
                    style={{
                      padding:"6px 14px", fontSize:12, fontWeight:500, borderRadius:6, cursor:"pointer",
                      background: view === opt.v ? "var(--ptc-green)" : "transparent",
                      color: view === opt.v ? "var(--ptc-white)" : "var(--text-secondary)",
                    }}>
                    {opt.label}
                  </span>
                ))}
              </div>
            </div>
            {view === "product" && <div style={{ marginTop:8, padding:"6px 12px",
              background: DRY_RUN ? "#FEF3C7" : "#D1FAE5",
              border: `1px solid ${DRY_RUN ? "#F59E0B" : "#10B981"}`,
              borderRadius:6, fontSize:12,
              color: DRY_RUN ? "#92400E" : "#065F46",
              display:"flex", alignItems:"center", justifyContent:"space-between",
            }}>
              <span>
                {DRY_RUN
                  ? "DRY RUN — Create buttons simulate success without calling APIs."
                  : "LIVE MODE — Create buttons will make real API calls to Codebeamer."}
                {struct && <span style={{ marginLeft:8, fontStyle:"italic", opacity:0.85 }}>
                  (locked — go back to Step 1 and re-generate to switch modes)
                </span>}
              </span>
              <label style={{
                display:"flex", alignItems:"center", gap:6, fontWeight:500,
                cursor: struct ? "not-allowed" : "pointer",
                opacity: struct ? 0.5 : 1,
              }}>
                <span>{DRY_RUN ? "Dry Run" : "Live"}</span>
                <input type="checkbox" checked={DRY_RUN}
                  disabled={!!struct}
                  onChange={(e) => setDryRun(e.target.checked)}
                  style={{ width:16, height:16, cursor: struct ? "not-allowed" : "pointer" }}
                />
              </label>
            </div>}
          </div>

          {/* ══════════════════════════════════════════════════════════════
              Phase 2 view router
              ══════════════════════════════════════════════════════════════ */}
          {view === "management" && (
            <ManagementView
              onPick={(p) => {
                // F-02 — wipe any in-flight wizard state before pre-selecting
                // the new domain. Prevents the Step 4 tabs from showing the
                // previous run's struct after a Management→tile re-entry.
                resetWizardState();
                setProduct(p);
                setView("product");
              }}
              onSwitchToProduct={() => setView("product")}
            />
          )}

          {view === "product" && <>
          <div className="no-print"><StepBar current={step} /></div>

          {/* ══ Step 0: Product Selection ════════════════════════════ */}
          {step === 0 && (
            <div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <div style={{ fontSize:14, fontWeight:500 }}>Select a product domain</div>
                <span
                  onClick={() => {
                    setProduct(null);
                    setCustomDomain("");
                    setCustomIndustry("");
                    setOpenaiKey("");
                    setSessionPrefix(buildSessionPrefix());
                    setErr("");
                    setStruct(null);
                    streamIdsRef.current = {};
                    // Re-fetch backend config so OpenAI mode reflects current env vars
                    fetch("/api/config").then(r=>r.json()).then(cfg => {
                      setBackendHasKey(cfg.hasOpenaiKey);
                      setUseLocalProxy(!!cfg.hasOpenaiKey);
                    }).catch(()=>{});
                  }}
                  style={{ fontSize:11, cursor:"pointer", textDecoration:"underline", color:"var(--text-secondary)" }}>
                  Reset form
                </span>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginBottom:16 }}>
                {PRODUCTS.map(p => (
                  <div key={p.id} onClick={() => setProduct(product?.id===p.id ? null : p)}
                    style={{
                      padding:"12px 8px", borderRadius:8, cursor:"pointer", textAlign:"center",
                      border:`1.5px solid ${product?.id===p.id ? "var(--border-primary)" : "var(--border-tertiary)"}`,
                      background: product?.id===p.id ? "var(--bg-secondary)" : "transparent",
                      transition:"all 0.15s ease",
                    }}>
                    <div style={{ fontSize:22, marginBottom:4 }}>{p.emoji}</div>
                    <div style={{ fontSize:12, fontWeight:500 }}>{p.label}</div>
                  </div>
                ))}
              </div>

              {!product && (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
                  <div>
                    <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:4 }}>Custom domain</div>
                    <input style={inputStyle} value={customDomain} onChange={e=>setCustomDomain(e.target.value)} placeholder="e.g. X-Ray Imaging Systems" />
                  </div>
                  <div>
                    <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:4 }}>Industry</div>
                    <input style={inputStyle} value={customIndustry} onChange={e=>setCustomIndustry(e.target.value)} placeholder="e.g. Medical Device" />
                  </div>
                </div>
              )}

              {product && (
                <div style={{ padding:"10px 14px", borderRadius:8, background:"var(--bg-secondary)",
                  border:"1px solid var(--border-tertiary)", fontSize:13, marginBottom:16, color:"var(--text-secondary)" }}>
                  <strong style={{ color:"var(--text-primary)" }}>{product.emoji} {product.label}</strong>
                  &nbsp;&middot;&nbsp;{product.domain}&nbsp;&middot;&nbsp;{product.industry}
                </div>
              )}

              {/* CB Connection */}
              <div style={{ fontSize:14, fontWeight:500, marginBottom:8, marginTop:24 }}>Codebeamer connection</div>
              <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:10 }}>
                Pre-filled from environment variables. Edit if needed. Credentials are sent to the local backend only.
              </div>
              <div style={{ display:"grid", gap:10, marginBottom:16 }}>
                <div>
                  <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:4 }}>CB Base URL</div>
                  <input style={inputStyle} value={cbUrl} onChange={e=>setCbUrl(e.target.value)} placeholder="https://your-cb-instance.com" />
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                  <div>
                    <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:4 }}>Username</div>
                    <input style={inputStyle} value={cbUser} onChange={e=>setCbUser(e.target.value)} placeholder="admin" />
                  </div>
                  <div>
                    <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:4 }}>Password</div>
                    <input type="password" style={inputStyle} value={cbPass} onChange={e=>setCbPass(e.target.value)} placeholder="password" />
                  </div>
                </div>
                <div>
                  <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:4 }}>
                    Stream name prefix
                    <span style={{ marginLeft:6, fontSize:11, opacity:0.7 }}>
                      — tags every stream this run creates so you can find/group them later (CB doesn't allow stream delete)
                    </span>
                  </div>
                  <input
                    style={inputStyle}
                    value={sessionPrefix}
                    onChange={e=>setSessionPrefix(e.target.value.replace(/[^\w-]/g, ""))}
                    placeholder="e.g. 260425-2103 (leave blank to disable)"
                  />
                </div>
              </div>

              {/* OpenAI */}
              <div style={{ fontSize:14, fontWeight:500, marginBottom:8 }}>OpenAI API Key</div>
              {useLocalProxy && backendHasKey ? (
                <div style={{ padding:"10px 14px", borderRadius:8, background:"#D1FAE5",
                  border:"1px solid #A7F3D0", fontSize:12, color:"#065F46", marginBottom:6 }}>
                  Using OPENAI_API_KEY from server environment variable.
                  <span onClick={() => setUseLocalProxy(false)}
                    style={{ marginLeft:8, cursor:"pointer", textDecoration:"underline" }}>
                    Use a different key
                  </span>
                </div>
              ) : (
                <div>
                  <input type="password" style={{...inputStyle, marginBottom:6}} value={openaiKey}
                    onChange={e=>{ setOpenaiKey(e.target.value); if (err) setErr(""); }} placeholder="sk-..." />
                  <div style={{ fontSize:11, color:"var(--text-tertiary)", marginBottom:6 }}>
                    Key is sent to the local backend proxy only (never to external servers from the browser).
                    {" "}
                    <span onClick={() => setUseLocalProxy(true)}
                      style={{ cursor:"pointer", textDecoration:"underline", color:"var(--text-secondary)" }}>
                      Use server env key
                    </span>
                  </div>
                </div>
              )}

              {err && (
                <div style={{ padding:"10px 14px", background:"var(--bg-danger)", border:"1px solid var(--border-danger)",
                  borderRadius:8, fontSize:12, color:"var(--text-danger)", marginTop:12, marginBottom:12 }}>
                  {err}
                </div>
              )}

              <div style={{ marginTop:16 }}>
                <button
                  style={(!domain.trim() || generating) ? btnDisabled : btnStyle(true)}
                  disabled={!domain.trim() || generating}
                  onClick={generateProjects}
                >
                  {generating ? genStage : "Generate Projects & Streams"}
                </button>
              </div>
            </div>
          )}

          {/* ══ Step 1: Projects ═════════════════════════════════════ */}
          {step === 1 && struct && (
            <div>
