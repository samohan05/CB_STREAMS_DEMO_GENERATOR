<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CB Demo Generator v4</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --bg-tertiary: #e9ecef;
      --bg-danger: #fff5f5;
      --text-primary: #212529;
      --text-secondary: #6c757d;
      --text-tertiary: #adb5bd;
      --text-danger: #dc3545;
      --border-primary: #212529;
      --border-secondary: #dee2e6;
      --border-tertiary: #e9ecef;
      --border-danger: #f5c6cb;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --accent: #1D9E75;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex; justify-content: center;
      padding: 2rem 1rem;
    }
    #root { max-width: 740px; width: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // ─── Product Catalog ──────────────────────────────────────────────
    const PRODUCTS = [
      { id:"mri",  emoji:"🔬", label:"MRI Systems",        domain:"Magnetic Resonance Imaging (MRI) Systems",         industry:"Medical Device / Radiology" },
      { id:"us",   emoji:"🏥", label:"Ultrasound",          domain:"Diagnostic Ultrasound Imaging Systems",            industry:"Medical Device / Radiology" },
      { id:"ct",   emoji:"🫁", label:"CT Scanner",           domain:"Computed Tomography (CT) Scanner Systems",         industry:"Medical Device / Radiology" },
      { id:"igt",  emoji:"🩺", label:"Image-Guided Therapy", domain:"Image-Guided Therapy & Intervention Systems",      industry:"Medical Device / Interventional" },
      { id:"pm",   emoji:"📊", label:"Patient Monitoring",   domain:"Multi-Parameter Patient Monitoring Systems",       industry:"Medical Device / Critical Care" },
      { id:"rt",   emoji:"☢️", label:"Radiotherapy",         domain:"External Beam Radiation Therapy Delivery Systems", industry:"Medical Device / Oncology" },
      { id:"pace", emoji:"❤️", label:"Pacemakers",           domain:"Implantable Cardiac Rhythm Management Devices",    industry:"Medical Device / Cardiology" },
      { id:"adas", emoji:"🚗", label:"ADAS Systems",         domain:"Advanced Driver Assistance Systems (ADAS/AD)",     industry:"Automotive / Safety-Critical" },
    ];

    const TIERS = [
      { key:"library_streams",      label:"Library Streams",      short:"LIB", clr:"#0F6E56", bg:"#E1F5EE" },
      { key:"product_line_streams", label:"Product Line Streams",  short:"PL",  clr:"#534AB7", bg:"#EEEDFE" },
      { key:"transform_streams",    label:"Transform Streams",     short:"TR",  clr:"#854F0B", bg:"#FAEEDA" },
      { key:"release_streams",      label:"Release Streams",       short:"REL", clr:"#185FA5", bg:"#E6F1FB" },
    ];

    // ─── Styles ───────────────────────────────────────────────────────
    const inputStyle = {
      width:"100%", boxSizing:"border-box", padding:"8px 10px",
      borderRadius:8, border:"1px solid var(--border-secondary)",
      background:"var(--bg-primary)", fontSize:13,
      color:"var(--text-primary)", fontFamily:"var(--font-sans)",
    };
    const btnStyle = (primary) => ({
      padding:"9px 20px", borderRadius:8, fontSize:13, fontWeight:500,
      cursor:"pointer", border:`1px solid ${primary ? "var(--border-primary)" : "var(--border-secondary)"}`,
      background: primary ? "var(--text-primary)" : "var(--bg-primary)",
      color: primary ? "var(--bg-primary)" : "var(--text-primary)",
    });
    const btnDisabled = { ...btnStyle(true), opacity:0.35, cursor:"not-allowed" };
    const smallBtnStyle = (primary) => ({
      ...btnStyle(primary), padding:"6px 14px", fontSize:12,
    });

    // ─── JSON parser ──────────────────────────────────────────────────
    function sanitizeJson(raw) {
      let s = raw.trim().replace(/^\uFEFF/,'').replace(/^```json?\s*/im,'').replace(/\s*```\s*$/im,'');
      let out='', inStr=false, esc=false;
      for (let i=0;i<s.length;i++){
        const ch=s[i];
        if(esc){out+=ch;esc=false;continue}
        if(ch==='\\'){out+=ch;esc=true;continue}
        if(ch==='"'){out+=ch;inStr=!inStr;continue}
        if(inStr){
          if(ch==='\n')out+='\\n';
          else if(ch==='\r')out+='\\r';
          else if(ch==='\t')out+='\\t';
          else out+=ch;
        } else out+=ch;
      }
      return out;
    }
    function parseAIJson(raw) {
      const fix=s=>s.replace(/,(\s*[}\]])/g,'$1');
      const attempts=[
        ()=>JSON.parse(fix(sanitizeJson(raw))),
        ()=>{const m=sanitizeJson(raw).match(/\{[\s\S]*/);if(!m)throw 0;return JSON.parse(fix(m[0]))},
        ()=>{
          let s=fix(sanitizeJson(raw).match(/\{[\s\S]*/)?.[0]||'');
          let b=0,k=0,inS=false,e2=false;
          for(const ch of s){if(e2){e2=false;continue}if(ch==='\\'){e2=true;continue}if(ch==='"'){inS=!inS;continue}if(inS)continue;if(ch==='{')b++;else if(ch==='}')b--;if(ch==='[')k++;else if(ch===']')k--}
          if(inS)s+='"';while(k>0){s+=']';k--}while(b>0){s+='}';b--}
          return JSON.parse(fix(s));
        },
      ];
      for(const fn of attempts){try{return fn()}catch(_){}}
      throw new Error('JSON repair failed');
    }

    // ─── Step Progress Bar ────────────────────────────────────────────
    const STEP_LABELS = ["Product","Projects","Requirements","Streams","Summary"];
    function StepBar({ current }) {
      return (
        <div style={{ display:"flex", gap:2, marginBottom:24 }}>
          {STEP_LABELS.map((lbl,i) => (
            <div key={i} style={{ flex:1, textAlign:"center" }}>
              <div style={{
                height:4, borderRadius:2, marginBottom:5,
                background: i<current ? "#1D9E75" : i===current ? "var(--text-primary)" : "var(--bg-tertiary)",
              }} />
              <span style={{ fontSize:11, color: i<=current ? "var(--text-secondary)" : "var(--text-tertiary)" }}>{lbl}</span>
            </div>
          ))}
        </div>
      );
    }

    function Stat({ value, label, color }) {
      return (
        <div style={{ textAlign:"center", padding:"10px 8px", borderRadius:8,
          border:"1px solid var(--border-tertiary)", background:"var(--bg-secondary)" }}>
          <div style={{ fontSize:20, fontWeight:600, color }}>{value}</div>
          <div style={{ fontSize:11, color:"var(--text-secondary)" }}>{label}</div>
        </div>
      );
    }

    function StatusBadge({ status }) {
      const cfg = {
        pending:  { bg:"var(--bg-tertiary)", color:"var(--text-tertiary)", text:"Pending" },
        creating: { bg:"#FEF3C7", color:"#92400E", text:"Creating..." },
        done:     { bg:"#D1FAE5", color:"#065F46", text:"Created" },
        error:    { bg:"#FEE2E2", color:"#991B1B", text:"Failed" },
      }[status] || { bg:"transparent", color:"var(--text-tertiary)", text:status };
      return (
        <span style={{ padding:"3px 10px", borderRadius:10, fontSize:11, fontWeight:500, background:cfg.bg, color:cfg.color }}>
          {cfg.text}
        </span>
      );
    }

    // ═══════════════════════════════════════════════════════════════════
    // MAIN APP
    // ═══════════════════════════════════════════════════════════════════
    function App() {
      const [step, setStep] = useState(0);
      const [dryRun, setDryRun] = useState(true);
      // Alias for easy reference throughout
      const DRY_RUN = dryRun;

      // Step 0: Product selection
      const [product, setProduct] = useState(null);
      const [customDomain, setCustomDomain] = useState("");
      const [customIndustry, setCustomIndustry] = useState("");

      // CB Connection (loaded from backend, editable)
      const [cbUrl, setCbUrl] = useState("");
      const [cbUser, setCbUser] = useState("");
      const [cbPass, setCbPass] = useState("");

      // OpenAI (always through backend proxy)
      const [backendHasKey, setBackendHasKey] = useState(false);
      const [useLocalProxy, setUseLocalProxy] = useState(true);
      const [openaiKey, setOpenaiKey] = useState("");

      // Data
      const [struct, setStruct] = useState(null);
      const [err, setErr] = useState("");
      const [generating, setGenerating] = useState(false);
      // Per-page in-flight guards for "Create All" buttons.
      // Prevents the user clicking twice and spawning parallel API trains.
      const [creatingAllProjects, setCreatingAllProjects] = useState(false);
      const [creatingAllReqs, setCreatingAllReqs] = useState(false);
      const [creatingAllStreams, setCreatingAllStreams] = useState(false);
      const [genStage, setGenStage] = useState("");

      // Project creation
      const [projectStatus, setProjectStatus] = useState({});
      const [projectIds, setProjectIds] = useState({});
      const [projectTrackers, setProjectTrackers] = useState({});
      const [projectErrors, setProjectErrors] = useState({});

      // Req/TC creation
      const [reqStatus, setReqStatus] = useState({});
      const [reqErrors, setReqErrors] = useState({});
      const [reqCounts, setReqCounts] = useState({});

      // Stream creation
      const [streamStatus, setStreamStatus] = useState({});
      // Per-stream sub-step message (e.g. "Stream created — adding 2 of 3 projects").
      // Cleared when status flips to "done" so the static badge takes over.
      const [streamProgress, setStreamProgress] = useState({});
      const [streamIds, setStreamIds] = useState({});
      // Mirror of streamIds in a ref — synchronous, so sequential createAllStreams
      // can see parent stream IDs created earlier in the same loop.
      // (React state updates don't propagate within the same closure, which caused
      // every PL/Transform/Release stream to fall back to initialStreamId.)
      const streamIdsRef = useRef({});
      const [streamErrors, setStreamErrors] = useState({});
      const [initialStreamId, setInitialStreamId] = useState(null);

      // Session prefix to tag every stream this run creates (CB doesn't allow
      // stream deletion via API, so a unique prefix lets the consultant
      // group / hide / mass-clean residue between demos).
      // Format: YYMMDD-HHMM, e.g. "260425-2103". Editable before generation.
      const buildSessionPrefix = () => {
        const d = new Date();
        const pad = n => String(n).padStart(2, "0");
        return `${String(d.getFullYear()).slice(2)}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}`;
      };
      const [sessionPrefix, setSessionPrefix] = useState(buildSessionPrefix());
      const prefixedStreamName = (n) => sessionPrefix ? `[${sessionPrefix}] ${n}` : n;

      // ── Cleanup state (Summary step) ─────────────────────────────────
      const [cleanupBusy, setCleanupBusy] = useState(false);
      const [cleanupPreview, setCleanupPreview] = useState(null); // {projects:[], streams:[]}
      const [cleanupResult, setCleanupResult] = useState(null);   // post-delete summary

      // Read CB category name from generated struct (used for project cleanup scope)
      const cleanupCategory = struct?.domain_name || "";

      const previewCleanup = async () => {
        if (!cleanupCategory) return;
        setCleanupBusy(true);
        setCleanupResult(null);
        try {
          // Projects in this category (dry-run)
          const pRes = await fetch("/api/cleanup/projects", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ category: cleanupCategory, dry_run: true }),
          }).then(r => r.json());
          // Streams matching this run's prefix (read-only listing)
          const sRes = sessionPrefix
            ? await fetch(`/api/cleanup/streams?prefix=${encodeURIComponent(sessionPrefix)}`)
                .then(r => r.json())
            : { count: 0, streams: [] };
          setCleanupPreview({ projects: pRes.projects || [], streams: sRes.streams || [] });
        } catch(e) {
          alert(`Preview failed: ${e.message}`);
        } finally {
          setCleanupBusy(false);
        }
      };

      const executeCleanup = async () => {
        if (!cleanupCategory || !cleanupPreview) return;
        const n = cleanupPreview.projects.length;
        if (!confirm(`Delete ${n} project(s) in category "${cleanupCategory}"?\n\nNote: streams cannot be deleted via the CB v3 API. They will be listed for manual cleanup but not removed.`)) return;
        setCleanupBusy(true);
        try {
          const r = await fetch("/api/cleanup/projects", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ category: cleanupCategory, dry_run: false }),
          }).then(r => r.json());
          setCleanupResult(r);
          setCleanupPreview(null);
        } catch(e) {
          alert(`Cleanup failed: ${e.message}`);
        } finally {
          setCleanupBusy(false);
        }
      };

      const domain   = product ? product.domain : customDomain;
      const industry = product ? product.industry : customIndustry;

      // Load config on mount
      useEffect(() => {
        fetch("/api/config").then(r=>r.json()).then(cfg => {
          if (cfg.cbUrl)  setCbUrl(cfg.cbUrl);
          if (cfg.cbUser) setCbUser(cfg.cbUser);
          setBackendHasKey(cfg.hasOpenaiKey);
          // If the server has no env-var key, flip to user-key mode immediately
          // so the input field appears (rather than the misleading green banner).
          if (!cfg.hasOpenaiKey) setUseLocalProxy(false);
        }).catch(()=>{});
      }, []);

      const updateStruct = (fn) => {
        setStruct(prev => {
          const clone = JSON.parse(JSON.stringify(prev));
          fn(clone);
          return clone;
        });
      };

      // ── OpenAI Generation ────────────────────────────────────────────
      const buildProjectPrompt = () => {
        return `You are a world-class systems engineer and ALM architect with deep domain expertise in ${industry}. Generate technically accurate Codebeamer demo data for:

Domain: ${domain}
Industry: ${industry}

CONTEXT — WHAT EACH LAYER REPRESENTS:
Think of building a real ${domain} product. The hierarchy is:

1. LIBRARY PROJECTS (6 total, grouped into 3 subsystem libraries of 2 each):
   These are the actual ENGINEERING COMPONENT/SUBSYSTEM projects — the real building blocks that engineers work on.
   Each project = one specific hardware module, software component, or functional subsystem.
   Example for Aircraft: "Flight Control Computer", "Inertial Navigation Unit", "Hydraulic Actuation System", "Fly-by-Wire Bus Controller", "Engine FADEC Interface", "Autopilot Mode Logic"
   Example for MRI: "Gradient Amplifier", "RF Transmit Chain", "Superconducting Magnet Controller", "Image Reconstruction Engine", "Patient Table Drive", "Shim Coil Controller"
   Example for Automotive: "Battery Management System", "Traction Inverter", "ADAS Sensor Fusion", "Brake-by-Wire ECU", "Infotainment Head Unit", "OTA Update Manager"
   IMPORTANT: Use REAL component names that an engineer in this domain would immediately recognize. Be specific — not generic labels like "Module A" or "Processing System".

2. LIBRARY STREAMS (3 total, each groups 2 related library projects):
   These represent the 3 major subsystem domains/disciplines. Each contains 2 of the 6 library projects above.
   Example for Aircraft: "Avionics Library", "Flight Controls Library", "Propulsion Interface Library"
   Example for MRI: "Magnet Subsystem Library", "RF Subsystem Library", "Computing Platform Library"

3. PRODUCT LINE STREAMS (2 total) — these are PRODUCT PLATFORMS or MARKET CATEGORIES:
   A product line = a family/class of products that share the same core components but target different markets.
   Example for Aircraft: "Commercial Narrow-Body Platform", "Business Jet Platform"
   Example for MRI: "High-Field Clinical Platform", "Wide-Bore Interventional Platform"
   Example for Automotive: "Premium EV Sedan Platform", "Urban Mobility Platform"

4. PL_PROJECTS (1 per product line stream, 2 total):
   These are integration/platform-level projects specific to each product line — they handle cross-subsystem integration, platform-level validation, and configuration for that product family.
   Example for Aircraft: "Narrow-Body Systems Integration", "Business Jet Avionics Integration"
   Name them so it is clear they belong to the platform, not a single component.

5. TRANSFORM STREAMS (2 total): Integration staging area. Mirrors PL streams. Parent = corresponding PL stream.

6. RELEASE STREAMS (3 total) — these are SPECIFIC PRODUCT MODELS being released:
   Each release = a concrete, shippable product with a plausible (fictional) model name.
   Example for Aircraft: "SkyLance 320neo", "AeroVista G700", "CloudRunner 220"
   Example for MRI: "Panorama Forte 3.0T", "ClarityVue 1.5T Open", "NeuroEdge 7T Research"
   Example for Automotive: "Volterra GT 2026", "Spark City EV", "Apex Crossover AWD"
   IMPORTANT: These must sound like REAL product names — specific, marketable, with model numbers or descriptive suffixes. Never use generic names like "Release 1.0" or "Product A".

7. RELEASE_PROJECTS (1 per release stream, 3 total):
   Release-specific verification, packaging, compliance, or certification projects for each product release.
   Example: "SkyLance 320neo Type Certification", "Panorama Forte 3.0T FDA Submission", "Volterra GT 2026 Homologation"

CRITICAL FORMAT RULES:
- Return ONLY raw valid JSON. No markdown. No backticks. No text outside JSON.
- All string values max 120 chars. No real newlines inside strings. Use \\n only in steps fields.
- project_key max 8 alphanumeric/underscore chars. No spaces. No hyphens.
- No apostrophes in any string value.
- Make project_key values intuitive abbreviations of the project name (e.g. "FLTCTRL" not "PRJ001").

Return this exact JSON structure:
{
  "domain_name": "short label for ${domain}",
  "projects": [
    {
      "project_key": "MAXEIGHT",
      "project_name": "Specific Component or Subsystem Name",
      "description": "What this engineering component does, max 80 chars",
      "subsystem": "Which of the 3 subsystem domains this belongs to",
      "requirements": [
        {
          "title": "The [specific component] shall [verb] [measurable value+unit] per [real standard]",
          "description": "One sentence technical context max 100 chars.",
          "priority": "High",
          "level": "System",
          "test_cases": [{
            "title": "Verify [specific measurable aspect] under [realistic condition]",
            "description": "Test objective max 80 chars.",
            "steps": "1. Setup per standard\\n2. Apply stimulus\\n3. Measure with instrument",
            "expected_result": "Specific measurable criterion with unit and tolerance"
          }]
        }
      ]
    }
  ],
  "pl_projects": [
    {
      "project_key": "PLPRJ1",
      "project_name": "Platform Integration Project Name",
      "description": "Cross-subsystem integration project for this product family",
      "stream_key": "PL_XXX",
      "requirements": [
        {
          "title": "The [platform] shall [integrate/validate] [cross-system aspect] per [standard]",
          "description": "Platform-level integration requirement, max 100 chars.",
          "priority": "High",
          "level": "System",
          "test_cases": [{
            "title": "Verify [platform integration aspect] under [operating condition]",
            "description": "Integration test objective max 80 chars.",
            "steps": "1. Configure all subsystems\\n2. Execute end-to-end scenario\\n3. Verify system-level behavior",
            "expected_result": "Specific measurable criterion with unit and tolerance"
          }]
        }
      ]
    }
  ],
  "release_projects": [
    {
      "project_key": "RELPRJ1",
      "project_name": "Product Model Certification/Validation Project",
      "description": "Release validation and compliance for this specific product",
      "stream_key": "REL_XXX",
      "requirements": [
        {
          "title": "The [product model] shall [comply/demonstrate] [certification criterion] per [standard]",
          "description": "Release-specific compliance or packaging requirement, max 100 chars.",
          "priority": "High",
          "level": "System",
          "test_cases": [{
            "title": "Verify [product release aspect] meets [regulatory/market requirement]",
            "description": "Release validation test objective max 80 chars.",
            "steps": "1. Prepare final release build\\n2. Execute certification test\\n3. Document compliance evidence",
            "expected_result": "Specific measurable pass/fail criterion"
          }]
        }
      ]
    }
  ],
  "library_streams": [
    { "stream_key": "LIB_XXX", "stream_name": "Subsystem Domain Library", "description": "max 80 chars", "project_keys": ["KEY1","KEY2"], "parent_stream_key": null }
  ],
  "product_line_streams": [
    { "stream_key": "PL_XXX", "stream_name": "Product Platform or Market Category", "description": "max 80 chars", "project_keys": ["all 6 library keys"], "parent_stream_key": null }
  ],
  "transform_streams": [
    { "stream_key": "TR_XXX", "stream_name": "Transform for Product Platform", "description": "max 80 chars", "project_keys": ["all 6 library keys"], "parent_stream_key": "PL_XXX" }
  ],
  "release_streams": [
    { "stream_key": "REL_XXX", "stream_name": "Fictional Product Model Name with Version", "description": "max 80 chars", "project_keys": ["all 6 library keys"], "parent_stream_key": "TR_XXX" }
  ]
}

STRICT QUANTITIES:
- projects: exactly 6 (3 subsystem domains x 2 projects each) — these are LIBRARY projects representing real components
- pl_projects: exactly 1 per product_line_stream (2 total). Each has stream_key matching its PL stream
- release_projects: exactly 1 per release_stream (3 total). Each has stream_key matching its release stream
- Each library project: exactly 5 requirements, each with 1 test case
- Each pl_project: exactly 5 requirements, each with 1 test case
- Each release_project: exactly 5 requirements, each with 1 test case
- library_streams: exactly 3 (one per subsystem domain, each references its 2 library projects)
- product_line_streams: exactly 2 (each references ALL 6 library project keys only)
- transform_streams: exactly 2 (each references ALL 6 library project keys only, parent = a PL stream)
- release_streams: exactly 3 (each references ALL 6 library project keys only, parent = a Transform stream)

CONTENT QUALITY RULES:
- Use real industry standards: IEC 60601/62304 for medical, ISO 26262 for automotive, DO-178C/DO-254 for avionics, IEC 61508 for industrial
- Requirements: shall-style with specific measurable values, units, tolerances (e.g. "within 50ms", "accuracy of +/-0.5mm", "at least 99.99% availability")
- Library project names: REAL component names an engineer would recognize — be specific and technical
- PL stream names: product platform or market category names (not generic "Product Line 1")
- Release stream names: plausible FICTIONAL product model names with version/model numbers — they should sound marketable and specific, never real trademarks
- 3 library streams must cover genuinely DISTINCT technical subsystem domains of ${domain}
- All keys globally unique, max 8 chars, should be intuitive abbreviations`;
      };

      const generateProjects = async () => {
        if (!domain.trim()) return;
        setGenerating(true);
        setErr("");
        setGenStage("Starting new log session...");

        // Start a new log file on the server for this generation run
        try {
          await fetch("/api/log/new-session", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              label: "generate",
              domain: domain,
              mode: DRY_RUN ? "DRY_RUN" : "LIVE",
            }),
          });
        } catch(e) {
          console.warn("Could not start log session:", e.message);
        }

        // Reset category flag so it re-creates if domain changed
        categoryCreated.current = false;

        setGenStage("Connecting to OpenAI GPT-4o...");

        try {
          setGenStage("Generating projects, requirements & streams...");

          const payload = {
            model: "gpt-4o",
            temperature: 0.3,
            // 8192 was too tight for IGT-class schemas (6 lib + 2 PL + 5 release
            // projects × 5 reqs × 2 TCs each). Backend allows up to 16384.
            max_tokens: 16384,
            messages: [
              { role: "system", content: "You are a world-class ALM architect. Return ONLY raw valid JSON. No markdown, no code fences, no preamble." },
              { role: "user", content: buildProjectPrompt() },
            ],
          };

          // Always call through backend proxy (credentials stay server-side).
          // If user pasted a key in the UI, forward it as X-OpenAI-Key — backend
          // prefers this header over OPENAI_API_KEY env var.
          const oaiHeaders = { "Content-Type": "application/json" };
          if (!useLocalProxy && openaiKey.trim()) {
            oaiHeaders["X-OpenAI-Key"] = openaiKey.trim();
          }
          const resp = await fetch("/api/openai/generate", {
            method: "POST",
            headers: oaiHeaders,
            body: JSON.stringify(payload),
          });

          if (!resp.ok) {
            let msg = `OpenAI API returned ${resp.status}`;
            try { const d = await resp.json(); if (d.error) msg = typeof d.error === 'string' ? d.error : d.error.message; } catch(_) {}
            throw new Error(msg);
          }
          const data = await resp.json();
          const rawText = data.choices?.[0]?.message?.content || "";
          const finishReason = data.choices?.[0]?.finish_reason || "";
          const usage = data.usage || {};
          if (!rawText.trim()) throw new Error("Empty response from OpenAI");
          // If the model hit max_tokens, it returned a truncated JSON — give the
          // user a precise error instead of the cryptic "JSON repair failed".
          if (finishReason === "length") {
            throw new Error(`OpenAI response was truncated (finish_reason=length, completion_tokens=${usage.completion_tokens || "?"} / max_tokens=16384). Try a smaller domain template or fewer release products.`);
          }

          setGenStage("Parsing AI response...");
          let parsed;
          try {
            parsed = parseAIJson(rawText);
          } catch (e) {
            throw new Error(`JSON repair failed (finish_reason=${finishReason}, completion_tokens=${usage.completion_tokens || "?"}). Raw response starts: ${rawText.slice(0, 200)}…`);
          }
          if (!parsed.projects?.length) throw new Error("No projects in AI response");

          // Tag library projects
          parsed.projects.forEach(p => { p.category = "library"; });

          // Merge PL-specific projects into main array
          if (parsed.pl_projects?.length) {
            parsed.pl_projects.forEach(p => { p.category = "product_line"; });
            parsed.projects = [...parsed.projects, ...parsed.pl_projects];
          }

          // Merge release-specific projects into main array
          if (parsed.release_projects?.length) {
            parsed.release_projects.forEach(p => { p.category = "release"; });
            parsed.projects = [...parsed.projects, ...parsed.release_projects];
          }

          // Auto-add PL projects to their PL stream's project_keys
          for (const plp of (parsed.pl_projects || [])) {
            const plStream = (parsed.product_line_streams || []).find(s => s.stream_key === plp.stream_key);
            if (plStream && !plStream.project_keys.includes(plp.project_key)) {
              plStream.project_keys.push(plp.project_key);
            }
          }

          // Auto-add release projects to their release stream's project_keys
          for (const rlp of (parsed.release_projects || [])) {
            const relStream = (parsed.release_streams || []).find(s => s.stream_key === rlp.stream_key);
            if (relStream && !relStream.project_keys.includes(rlp.project_key)) {
              relStream.project_keys.push(rlp.project_key);
            }
          }

          // Initialize Transform streams to mirror PL library selections
          // and Release streams to mirror Transform + their release projects
          const libKeys = parsed.projects.filter(p => p.category === "library").map(p => p.project_key);
          for (const tr of (parsed.transform_streams || [])) {
            tr.project_keys = [...libKeys];
          }
          for (const rel of (parsed.release_streams || [])) {
            const relProjKeys = rel.project_keys.filter(k =>
              parsed.projects.some(p => p.project_key === k && p.category === "release")
            );
            rel.project_keys = [...libKeys, ...relProjKeys];
          }

          setStruct(parsed);
          setProjectStatus({});
          setProjectIds({});
          setProjectTrackers({});
          setProjectErrors({});
          setReqStatus({});
          setReqErrors({});
          setReqCounts({});
          setStreamStatus({});
          setStreamIds({});
          streamIdsRef.current = {};
          setStreamErrors({});
          setStep(1);
        } catch(e) {
          setErr(e.message);
        } finally {
          setGenerating(false);
          setGenStage("");
        }
      };

      // ── CB API Helpers (through local proxy) ─────────────────────────
      const cbFetch = async (method, path, body = null) => {
        const url = `/api/cb/v3/${path.replace(/^\/cb\/api\/v3\//, "").replace(/^\//, "")}`;
        const opts = {
          method,
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
        };
        if (body) opts.body = JSON.stringify(body);
        const r = await fetch(url, opts);
        if (!r.ok) {
          let detail = "";
          try { detail = await r.text(); } catch(_) {}
          throw new Error(`${r.status}: ${detail.substring(0, 300)}`);
        }
        const text = await r.text();
        return text ? JSON.parse(text) : null;
      };
      const cbGet   = (path) => cbFetch("GET", path);
      const cbPost  = (path, body) => cbFetch("POST", path, body);
      const cbPut   = (path, body) => cbFetch("PUT", path, body);
      const cbPatch = (path, body) => cbFetch("PATCH", path, body);

      const cbFetchV1 = async (method, path, body = null) => {
        const url = `/api/cb/v1/${path.replace(/^\//, "")}`;
        const opts = {
          method,
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
        };
        if (body) opts.body = JSON.stringify(body);
        const r = await fetch(url, opts);
        if (!r.ok) {
          let detail = "";
          try { detail = await r.text(); } catch(_) {}
          throw new Error(`${r.status}: ${detail.substring(0, 300)}`);
        }
        const text = await r.text();
        return text ? JSON.parse(text) : null;
      };
      const cbGetV1  = (path) => cbFetchV1("GET", path);
      const cbPostV1 = (path, body) => cbFetchV1("POST", path, body);

      // ── Project creation ─────────────────────────────────────────────
      const categoryName = domain || "Demo";
      const categoryCreated = useRef(false);

      const ensureCategoryExists = async () => {
        if (categoryCreated.current || DRY_RUN) return;
        try {
          const catResp = await fetch("/api/cb/api/projects/category", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify({ categoryName: categoryName }),
          });
          if (catResp.ok) {
            console.log("Category pre-created:", await catResp.json());
          } else {
            console.log("Category pre-creation response:", catResp.status, await catResp.text());
          }
          categoryCreated.current = true;
          // Wait for CB to finish provisioning the category
          await new Promise(r => setTimeout(r, 5000));
        } catch(e) {
          console.warn("Category pre-creation failed (continuing):", e.message);
          categoryCreated.current = true; // Don't retry on every project
        }
      };

      // Resolve trackers (req, TC, Verifies field) for a given project ID
      const resolveProjectTrackers = async (pid, idx) => {
        const trackers = await cbGet(`projects/${pid}/trackers`);
        const trackerList = Array.isArray(trackers) ? trackers : (trackers?.trackers || trackers?.items || []);

        let reqTrackerId = null, tcTrackerId = null;
        let reqTrackerName = "", tcTrackerName = "";
        let fallbackReqId = null, fallbackReqName = "";

        for (const t of trackerList) {
          const name = (t.name || "").toLowerCase();
          if (name.includes("system") && name.includes("requirement")) {
            reqTrackerId = t.id; reqTrackerName = t.name;
          }
          if (name.includes("requirement") && !fallbackReqId) {
            fallbackReqId = t.id; fallbackReqName = t.name;
          }
          if (name.includes("test") && name.includes("case") && !tcTrackerId) {
            tcTrackerId = t.id; tcTrackerName = t.name;
          }
        }
        if (!reqTrackerId && fallbackReqId) {
          reqTrackerId = fallbackReqId; reqTrackerName = fallbackReqName;
        }

        let verifiesFieldId = null;
        if (tcTrackerId) {
          try {
            const schema = await cbGet(`trackers/${tcTrackerId}/schema`);
            const fields = schema?.fields || (Array.isArray(schema) ? schema : []);
            for (const f of fields) {
              const fn = (f.name || "").toLowerCase();
              if (fn === "verifies" || fn.includes("verifies")) {
                verifiesFieldId = f.id || f.fieldId; break;
              }
            }
          } catch(_) {}
        }

        setProjectIds(prev => ({ ...prev, [idx]: pid }));
        setProjectTrackers(prev => ({ ...prev, [idx]: {
          reqTrackerId, tcTrackerId, verifiesFieldId, reqTrackerName, tcTrackerName
        }}));
        setProjectStatus(prev => ({ ...prev, [idx]: "done" }));
      };

      // Helper: fetch all projects in the category from CB
      const fetchCategoryProjects = async () => {
        try {
          const cbProjects = await cbGetV1(
            `projects/page/1?pagesize=500&category=${encodeURIComponent(categoryName)}`
          );
          const projectList = cbProjects?.projects || cbProjects || [];
          return Array.isArray(projectList) ? projectList : [];
        } catch(e) {
          console.warn("fetchCategoryProjects failed:", e.message);
          return [];
        }
      };

      // Helper: find project by name in CB
      const findProjectInCB = async (projectName) => {
        const list = await fetchCategoryProjects();
        for (const p of list) {
          if ((p.name || "").toLowerCase() === projectName.toLowerCase()) {
            return p.id || (p.uri ? parseInt(p.uri.split("/").pop()) : null);
          }
        }
        return null;
      };

      // Helper: generate a unique project key that doesn't conflict with existing CB projects
      const makeUniqueKey = async (baseKey) => {
        // Fetch all existing projects to check for key conflicts
        // CB v1 project list doesn't always return keyName, so we check by trying
        // First, just try the base key truncated to 8 chars
        const key = baseKey.substring(0, 8).toUpperCase();
        // Try the key — if POST fails with "same name", we'll get a conflict
        // Generate a unique key with a timestamp suffix
        const suffix = Date.now().toString(36).slice(-3).toUpperCase(); // 3-char alphanumeric
        const uniqueKey = (key.substring(0, 5) + suffix).substring(0, 8);
        return uniqueKey;
      };

      const createProject = async (idx) => {
        const p = struct.projects[idx];
        setProjectStatus(prev => ({ ...prev, [idx]: "creating" }));
        setProjectErrors(prev => { const n = {...prev}; delete n[idx]; return n; });

        if (DRY_RUN) {
          await new Promise(r => setTimeout(r, 300));
          const fakePid = 10000 + idx;
          setProjectIds(prev => ({ ...prev, [idx]: fakePid }));
          setProjectTrackers(prev => ({ ...prev, [idx]: {
            reqTrackerId: 20000 + idx, tcTrackerId: 30000 + idx, verifiesFieldId: 9999,
            reqTrackerName: "System Requirement Specification", tcTrackerName: "Test Cases"
          }}));
          setProjectStatus(prev => ({ ...prev, [idx]: "done" }));
          return;
        }

        try {
          // Ensure category exists before first project creation
          await ensureCategoryExists();

          // Step 1: Check if project already exists in CB (from a previous run)
          const existingPid = await findProjectInCB(p.project_name);
          if (existingPid) {
            console.log(`Project "${p.project_name}" already exists (ID: ${existingPid}), resolving trackers...`);
            setProjectErrors(prev => ({ ...prev, [idx]: `Already exists (ID: ${existingPid}), resolving...` }));
            await resolveProjectTrackers(existingPid, idx);
            setProjectErrors(prev => { const n = {...prev}; delete n[idx]; return n; });
            return;
          }

          // Step 2: Try to create project. On key conflict (403 "under creation"),
          // retry with a unique key since CB rejects duplicate keyNames with this error.
          const MAX_RETRIES = 3;
          const RETRY_DELAY = 10000;
          let pid = null;
          let currentKey = p.project_key.substring(0, 8);

          for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
            const projectBody = {
              name: p.project_name,
              keyName: currentKey,
              description: p.description || p.project_name,
              category: categoryName,
            };

            try {
              setProjectErrors(prev => ({ ...prev, [idx]: attempt > 0 ? `Retrying with key "${currentKey}"... (${attempt + 1}/${MAX_RETRIES + 1})` : "Creating..." }));
              const result = await cbPostV1("project", projectBody);
              pid = result?.id || (result?.uri ? parseInt(result.uri.split("/").pop()) : null);
              if (pid) break;
            } catch(e) {
              const isConflict = e.message && (
                e.message.includes("under creation") ||
                e.message.includes("already exists") ||
                e.message.includes("409")
              );
              if (!isConflict) throw e;

              console.log(`Project "${p.project_name}" key "${currentKey}" — conflict (attempt ${attempt + 1}/${MAX_RETRIES + 1}): ${e.message}`);

              // Check if CB actually created it despite the error
              await new Promise(r => setTimeout(r, 5000));
              const foundPid = await findProjectInCB(p.project_name);
              if (foundPid) {
                console.log(`Project "${p.project_name}" found in CB after conflict (ID: ${foundPid})`);
                pid = foundPid;
                break;
              }

              if (attempt < MAX_RETRIES) {
                // Generate a new unique key and retry
                const suffix = Date.now().toString(36).slice(-3).toUpperCase();
                currentKey = (p.project_key.substring(0, 5) + suffix).substring(0, 8);
                console.log(`Retrying with new key: "${currentKey}"`);
                setProjectErrors(prev => ({
                  ...prev,
                  [idx]: `Key conflict — retrying with key "${currentKey}" in ${RETRY_DELAY/1000}s...`
                }));
                await new Promise(r => setTimeout(r, RETRY_DELAY));
              } else {
                throw new Error(`Key conflict after ${MAX_RETRIES + 1} attempts. Delete old projects in CB or use a different domain.`);
              }
            }
          }

          if (!pid) throw new Error("No project ID returned from CB");

          // Step 3: Resolve trackers
          setProjectErrors(prev => ({ ...prev, [idx]: "Resolving trackers..." }));
          await resolveProjectTrackers(pid, idx);
          setProjectErrors(prev => { const n = {...prev}; delete n[idx]; return n; });

        } catch(e) {
          setProjectStatus(prev => ({ ...prev, [idx]: "error" }));
          setProjectErrors(prev => ({ ...prev, [idx]: e.message }));
        }
      };

      const createAllProjects = async () => {
        if (creatingAllProjects) return; // guard against double-click
        setCreatingAllProjects(true);
        try {
          // Category pre-creation is handled automatically by ensureCategoryExists()
          // inside createProject() — runs once on first project, then skips.

          // Create projects sequentially with 10s delay between each.
          // CB needs time to finish background provisioning (trackers, templates)
          // before accepting the next project creation.
          const pending = struct.projects
            .map((_, i) => i)
            .filter(i => projectStatus[i] !== "done");
          for (let pi = 0; pi < pending.length; pi++) {
            if (pi > 0) await new Promise(r => setTimeout(r, 10000));
            await createProject(pending[pi]);
          }
        } finally {
          setCreatingAllProjects(false);
        }
      };

      const allProjectsCreated = struct?.projects?.length > 0 &&
        struct.projects.every((_, i) => projectStatus[i] === "done");

      // ── Validate & resolve all projects before proceeding ───────────
      const [validating, setValidating] = useState(false);

      const validateAndProceed = async (nextStep) => {
        if (DRY_RUN) { setStep(nextStep); return; }
        if (allProjectsCreated) { setStep(nextStep); return; }

        setValidating(true);
        try {
          // Fetch all projects in this category from CB
          const cbProjects = await cbGetV1(`projects/page/1?pagesize=500&category=${encodeURIComponent(categoryName)}`);
          const projectList = cbProjects?.projects || cbProjects || [];

          // Build a lookup by project name for matching
          const cbByName = {};
          for (const p of (Array.isArray(projectList) ? projectList : [])) {
            const name = p.name || "";
            cbByName[name.toLowerCase()] = p;
          }

          const missing = [];
          for (let i = 0; i < struct.projects.length; i++) {
            // Already resolved — skip
            if (projectStatus[i] === "done" && projectIds[i]) continue;

            const p = struct.projects[i];
            const match = cbByName[p.project_name.toLowerCase()];

            if (!match) {
              missing.push(p.project_name);
              continue;
            }

            const pid = match.id || (match.uri ? parseInt(match.uri.split("/").pop()) : null);
            if (!pid) { missing.push(p.project_name); continue; }

            // Resolve trackers for this project
            try {
              await resolveProjectTrackers(pid, i);
            } catch(e) {
              console.warn(`Failed to resolve trackers for ${p.project_name}:`, e.message);
              missing.push(p.project_name);
            }
          }

          if (missing.length > 0) {
            alert(`Create all projects before proceeding. Missing projects:\n\n${missing.join("\n")}`);
          } else {
            setStep(nextStep);
          }
        } catch(e) {
          alert(`Validation failed: ${e.message}`);
        } finally {
          setValidating(false);
        }
      };

      // ── Requirement & TC creation ────────────────────────────────────
      const createTrackerItems = async (idx) => {
        setReqStatus(prev => ({ ...prev, [idx]: "creating" }));
        setReqErrors(prev => { const n = {...prev}; delete n[idx]; return n; });
        const p = struct.projects[idx];
        const trackers = projectTrackers[idx];
        const pid = projectIds[idx];

        if (DRY_RUN) {
          await new Promise(r => setTimeout(r, 300));
          const reqs = p.requirements || [];
          // TC grouping: TC1 covers reqs 0-2, TC2 covers reqs 3+
          const tcCount = reqs.length > 0 ? (reqs.length <= 3 ? 1 : 2) : 0;
          const totalTCs = reqs.reduce((sum, req) => sum + (req.test_cases?.length || 0), 0);
          setReqCounts(prev => ({ ...prev, [idx]: { reqs: reqs.length, tcs: Math.max(tcCount, totalTCs), verifies: reqs.length } }));
          setReqStatus(prev => ({ ...prev, [idx]: "done" }));
          return;
        }

        if (!trackers?.reqTrackerId || !trackers?.tcTrackerId) {
          setReqStatus(prev => ({ ...prev, [idx]: "error" }));
          setReqErrors(prev => ({ ...prev, [idx]: `Missing tracker IDs. Found: Req=${trackers?.reqTrackerName || "none"}, TC=${trackers?.tcTrackerName || "none"}` }));
          return;
        }

        try {
          let reqCount = 0, tcCount = 0, verifyCount = 0;
          const reqs = p.requirements || [];
          const reqIds = [];

          for (const req of reqs) {
            const r = await cbPost(`trackers/${trackers.reqTrackerId}/items`, {
              name: req.title,
              description: req.description || "",
            });
            reqIds.push(r.id);
            reqCount++;
          }

          const tcGroups = [reqIds.slice(0, 3), reqIds.slice(3)];
          for (const group of tcGroups) {
            if (group.length === 0) continue;
            const srcReqIdx = reqIds.indexOf(group[0]);
            const tcData = reqs[srcReqIdx]?.test_cases?.[0];
            if (!tcData) continue;

            const tc = await cbPost(`trackers/${trackers.tcTrackerId}/items`, {
              name: tcData.title,
              description: `${tcData.description || ""}\nSteps: ${tcData.steps || ""}\nExpected: ${tcData.expected_result || ""}`,
            });
            tcCount++;

            // Set Verifies field — PUT /v3/items/{id}/fields with UpdateTrackerItemField body.
            // The earlier endpoint /v3/items/{id} with customFields triggered a CB 400
            // ("State transition from New to -- is not defined") because that endpoint
            // expects a full TrackerItem update; the field-level endpoint is the correct one.
            const verifiesId = trackers.verifiesFieldId;
            if (verifiesId && group.length > 0) {
              try {
                await cbPut(`items/${tc.id}/fields`, {
                  fieldValues: [{
                    fieldId: verifiesId,
                    name: "Verifies",
                    type: "ChoiceFieldValue",
                    values: group.map(reqId => ({ id: reqId, type: "TrackerItemReference" })),
                  }],
                });
                verifyCount += group.length;
              } catch(e) {
                console.warn(`Verifies link PUT failed for TC ${tc.id} -> Reqs [${group.join(",")}]:`, e.message);
              }
            } else {
              console.warn(`No Verifies field found for TC tracker ${trackers.tcTrackerId}. Skipping traceability links.`);
            }
          }

          setReqCounts(prev => ({ ...prev, [idx]: { reqs: reqCount, tcs: tcCount, verifies: verifyCount } }));
          setReqStatus(prev => ({ ...prev, [idx]: "done" }));
        } catch(e) {
          setReqStatus(prev => ({ ...prev, [idx]: "error" }));
          setReqErrors(prev => ({ ...prev, [idx]: e.message }));
        }
      };

      const createAllReqs = async () => {
        if (creatingAllReqs) return; // guard against double-click
        setCreatingAllReqs(true);
        try {
          const pending = struct.projects
            .map((_, i) => i)
            .filter(i => reqStatus[i] !== "done");
          await Promise.allSettled(pending.map(i => createTrackerItems(i)));
        } finally {
          setCreatingAllReqs(false);
        }
      };

      const allReqsCreated = struct?.projects?.length > 0 &&
        struct.projects.every((_, i) => reqStatus[i] === "done");

      // ── Stream creation ──────────────────────────────────────────────
      useEffect(() => {
        if (step === 3 && !initialStreamId) {
          if (DRY_RUN) {
            setInitialStreamId(99999);
            return;
          }
          cbGet("streams/initial")
            .then(r => {
              const id = typeof r === "number" ? r : (r?.id || r?.streamId || r);
              setInitialStreamId(id);
            })
            .catch(() => {});
        }
      }, [step]);

      // Build a lookup: project_key -> library stream_key that contains it (memoized)
      const projectToLibraryMap = useMemo(() => {
        const map = {};
        for (const lib of (struct?.library_streams || [])) {
          for (const pk of (lib.project_keys || [])) {
            map[pk] = lib.stream_key;
          }
        }
        return map;
      }, [struct?.library_streams]);

      // Keep function form for backward compat in render code
      const getProjectToLibraryMap = () => projectToLibraryMap;

      // Get the source stream ID for a specific project being added to a stream.
      // Source is determined by the project's CATEGORY, not the tier alone.
      // Library and PL streams have NO sourceStreamId at creation (top-level),
      // so per-project source mapping carries the lineage:
      //   library project    → its library stream  (PL tier)  / initial (Library tier)
      //   product_line proj  → initial             (PL tier)
      //   release project    → initial             (Release tier)
      //   transform tier     → no PUTs at all (pure inheritance from PL parent)
      // Reads from streamIdsRef (synchronous) so this works mid-sequential-loop.
      const getSourceForProject = (tierKey, stream, projectKey) => {
        const ids = streamIdsRef.current;
        const proj = struct?.projects?.find(p => p.project_key === projectKey);
        const cat = proj?.category;

        if (tierKey === "library_streams") {
          // All library-tier projects come straight from initial.
          return initialStreamId;
        }
        if (tierKey === "product_line_streams") {
          if (cat === "library") {
            // Library project pulled into a PL stream — source from its library
            const libKey = projectToLibraryMap[projectKey];
            if (libKey && ids[libKey]) return ids[libKey];
            return initialStreamId; // fallback if library stream id not yet known
          }
          if (cat === "product_line") {
            // PL-specific project — source from initial
            return initialStreamId;
          }
          return null; // unknown category — skip
        }
        if (tierKey === "transform_streams") {
          // Transform is a pure mirror of its PL parent — no explicit project adds.
          return null;
        }
        if (tierKey === "release_streams") {
          if (cat === "release") {
            return initialStreamId;
          }
          // library/PL projects inherit through Transform — skip
          return null;
        }
        return null;
      };

      const createStream = async (tierKey, idx) => {
        const streams = struct[tierKey] || [];
        const st = streams[idx];
        const sKey = `${tierKey}_${idx}`;
        setStreamStatus(prev => ({ ...prev, [sKey]: "creating" }));
        setStreamProgress(prev => ({ ...prev, [sKey]: "Creating stream..." }));
        setStreamErrors(prev => { const n = {...prev}; delete n[sKey]; return n; });

        if (DRY_RUN) {
          await new Promise(r => setTimeout(r, 200));
          const fakeSid = 50000 + idx + (tierKey === "product_line_streams" ? 100 : tierKey === "transform_streams" ? 200 : tierKey === "release_streams" ? 300 : 0);
          setStreamIds(prev => ({ ...prev, [st.stream_key]: fakeSid }));
          setStreamStatus(prev => ({ ...prev, [sKey]: "done" }));
          setStreamProgress(prev => { const n = {...prev}; delete n[sKey]; return n; });
          return;
        }

        try {
          // Stream creation policy:
          //   Library → top-level, NO sourceStreamId (avoids inheriting all 101 initial-stream projects)
          //   PL      → top-level, NO sourceStreamId (lineage encoded per-project via PUT sourceStreamId)
          //   Transform → sourceStreamId = parent PL  (pure mirror)
          //   Release   → sourceStreamId = parent Transform  (release adds release-specific projects on top)
          // Read from streamIdsRef so this sees siblings created earlier in the same loop.
          const ids = streamIdsRef.current;
          let sourceId = null;
          if (tierKey === "transform_streams" || tierKey === "release_streams") {
            sourceId = st.parent_stream_key ? ids[st.parent_stream_key] : null;
          }
          // library_streams and product_line_streams: sourceId stays null

          const body = { name: prefixedStreamName(st.stream_name), color: "#336699", description: st.description || "" };
          if (sourceId) {
            body.sourceStreamId = sourceId;
            body.isSourceStreamChecked = true;
          }
          const result = await cbPost("streams/stream", body);
          const sid = result?.id;
          if (!sid) throw new Error("No stream ID in response");

          // Update both the ref (immediate) and the state (for re-render).
          streamIdsRef.current = { ...streamIdsRef.current, [st.stream_key]: sid };
          setStreamIds(prev => ({ ...prev, [st.stream_key]: sid }));
          setStreamProgress(prev => ({ ...prev, [sKey]: `Stream created (id ${sid}) — preparing projects...` }));

          // Which project categories does this tier explicitly add?
          //   library_streams      → ["library"]
          //   product_line_streams → ["library", "product_line"]   (both — library projects get added with their library as source)
          //   transform_streams    → []  (pure inherit from PL parent)
          //   release_streams      → ["release"]                   (library + PL projects inherit through Transform)
          const ownCategoriesByTier = {
            library_streams: ["library"],
            product_line_streams: ["library", "product_line"],
            transform_streams: [],
            release_streams: ["release"],
          };
          const ownCategories = ownCategoriesByTier[tierKey] || [];

          // Pre-compute the work list so progress can show "N of M".
          const workList = [];
          let skippedInherited = 0;
          for (const pk of (st.project_keys || [])) {
            const pidIdx = struct.projects.findIndex(p => p.project_key === pk);
            const proj = struct.projects[pidIdx];
            if (!proj || !ownCategories.includes(proj.category)) {
              skippedInherited++;
              continue;
            }
            const pid = projectIds[pidIdx];
            const projSourceId = getSourceForProject(tierKey, st, pk);
            if (pid && projSourceId) workList.push({ pk, pid, projSourceId });
          }

          if (workList.length === 0) {
            // Transform tier (or any tier with nothing to add) — pure inheritance.
            setStreamProgress(prev => ({ ...prev, [sKey]: `Stream created (id ${sid}). Mirroring ${skippedInherited} project(s) from parent stream.` }));
          }

          let addedCount = 0, failedCount = 0;
          for (let wi = 0; wi < workList.length; wi++) {
            const { pk, pid, projSourceId } = workList[wi];
            setStreamProgress(prev => ({
              ...prev,
              [sKey]: `Stream created (id ${sid}). Adding project ${wi + 1} of ${workList.length}: ${pk}...`,
            }));
            try {
              await cbPut(`streams/${sid}/projects`, {
                projectId: pid,
                sourceStreamId: projSourceId,
                addAllTrackers: true,
              });
              addedCount++;
            } catch(e) {
              failedCount++;
              console.warn(`Failed to add project ${pk} to stream ${st.stream_key}:`, e.message);
            }
          }
          if (skippedInherited > 0) {
            console.log(`[${st.stream_key}] added ${addedCount} own-tier project(s), inherited ${skippedInherited} via sourceStreamId`);
          }

          // Final summary — replaces the in-flight progress with a static success line.
          const summaryParts = [`Stream id ${sid}`];
          if (addedCount > 0) summaryParts.push(`${addedCount} project(s) added`);
          if (failedCount > 0) summaryParts.push(`${failedCount} failed`);
          if (skippedInherited > 0 && workList.length === 0) summaryParts.push(`${skippedInherited} inherited from parent`);
          setStreamProgress(prev => ({ ...prev, [sKey]: summaryParts.join(" · ") }));
          setStreamStatus(prev => ({ ...prev, [sKey]: "done" }));
        } catch(e) {
          setStreamStatus(prev => ({ ...prev, [sKey]: "error" }));
          setStreamProgress(prev => { const n = {...prev}; delete n[sKey]; return n; });
          setStreamErrors(prev => ({ ...prev, [sKey]: e.message }));
        }
      };

      const createAllStreams = async () => {
        if (creatingAllStreams) return; // guard against double-click
        setCreatingAllStreams(true);
        try {
          for (const tier of TIERS) {
            const streams = struct[tier.key] || [];
            for (let i = 0; i < streams.length; i++) {
              const sKey = `${tier.key}_${i}`;
              if (streamStatus[sKey] !== "done") {
                await createStream(tier.key, i);
              }
            }
          }
        } finally {
          setCreatingAllStreams(false);
        }
      };

      // ═══════════════════════════════════════════════════════════════
      // RENDER
      // ═══════════════════════════════════════════════════════════════
      return (
        <div style={{ padding:"0.5rem 0" }}>
          <div style={{ marginBottom:24 }}>
            <div style={{ fontSize:20, fontWeight:600, color:"var(--text-primary)" }}>
              CB Demo Generator v4
            </div>
            <div style={{ fontSize:13, color:"var(--text-secondary)", marginTop:4 }}>
              AI-powered Codebeamer ALM demo provisioning &middot; Local server mode
            </div>
            <div style={{ marginTop:8, padding:"6px 12px",
              background: DRY_RUN ? "#FEF3C7" : "#D1FAE5",
              border: `1px solid ${DRY_RUN ? "#F59E0B" : "#10B981"}`,
              borderRadius:6, fontSize:12,
              color: DRY_RUN ? "#92400E" : "#065F46",
              display:"flex", alignItems:"center", justifyContent:"space-between",
            }}>
              <span>
                {DRY_RUN
                  ? "DRY RUN — Create buttons simulate success without calling APIs."
                  : "LIVE MODE — Create buttons will make real API calls to Codebeamer."}
                {struct && <span style={{ marginLeft:8, fontStyle:"italic", opacity:0.85 }}>
                  (locked — go back to Step 1 and re-generate to switch modes)
                </span>}
              </span>
              <label style={{
                display:"flex", alignItems:"center", gap:6, fontWeight:500,
                cursor: struct ? "not-allowed" : "pointer",
                opacity: struct ? 0.5 : 1,
              }}>
                <span>{DRY_RUN ? "Dry Run" : "Live"}</span>
                <input type="checkbox" checked={DRY_RUN}
                  disabled={!!struct}
                  onChange={(e) => setDryRun(e.target.checked)}
                  style={{ width:16, height:16, cursor: struct ? "not-allowed" : "pointer" }}
                />
              </label>
            </div>
          </div>

          <StepBar current={step} />

          {/* ══ Step 0: Product Selection ════════════════════════════ */}
          {step === 0 && (
            <div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10 }}>
                <div style={{ fontSize:14, fontWeight:500 }}>Select a product domain</div>
                <span
                  onClick={() => {
                    setProduct(null);
                    setCustomDomain("");
                    setCustomIndustry("");
                    setOpenaiKey("");
                    setSessionPrefix(buildSessionPrefix());
                    setErr("");
                    setStruct(null);
                    streamIdsRef.current = {};
                    // Re-fetch backend config so OpenAI mode reflects current env vars
                    fetch("/api/config").then(r=>r.json()).then(cfg => {
                      setBackendHasKey(cfg.hasOpenaiKey);
                      setUseLocalProxy(!!cfg.hasOpenaiKey);
                    }).catch(()=>{});
                  }}
                  style={{ fontSize:11, cursor:"pointer", textDecoration:"underline", color:"var(--text-secondary)" }}>
                  Reset form
                </span>
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginBottom:16 }}>
                {PRODUCTS.map(p => (
                  <div key={p.id} onClick={() => setProduct(product?.id===p.id ? null : p)}
                    style={{
                      padding:"12px 8px", borderRadius:8, cursor:"pointer", textAlign:"center",
                      border:`1.5px solid ${product?.id===p.id ? "var(--border-primary)" : "var(--border-tertiary)"}`,
                      background: product?.id===p.id ? "var(--bg-secondary)" : "transparent",
                      transition:"all 0.15s ease",
                    }}>
                    <div style={{ fontSize:22, marginBottom:4 }}>{p.emoji}</div>
                    <div style={{ fontSize:12, fontWeight:500 }}>{p.label}</div>
                  </div>
                ))}
              </div>

              {!product && (
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:16 }}>
                  <div>
                    <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:4 }}>Custom domain</div>
                    <input style={inputStyle} value={customDomain} onChange={e=>setCustomDomain(e.target.value)} placeholder="e.g. X-Ray Imaging Systems" />
                  </div>
                  <div>
                    <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:4 }}>Industry</div>
                    <input style={inputStyle} value={customIndustry} onChange={e=>setCustomIndustry(e.target.value)} placeholder="e.g. Medical Device" />
                  </div>
                </div>
              )}

              {product && (
                <div style={{ padding:"10px 14px", borderRadius:8, background:"var(--bg-secondary)",
                  border:"1px solid var(--border-tertiary)", fontSize:13, marginBottom:16, color:"var(--text-secondary)" }}>
                  <strong style={{ color:"var(--text-primary)" }}>{product.emoji} {product.label}</strong>
                  &nbsp;&middot;&nbsp;{product.domain}&nbsp;&middot;&nbsp;{product.industry}
                </div>
              )}

              {/* CB Connection */}
              <div style={{ fontSize:14, fontWeight:500, marginBottom:8, marginTop:24 }}>Codebeamer connection</div>
              <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:10 }}>
                Pre-filled from environment variables. Edit if needed. Credentials are sent to the local backend only.
              </div>
              <div style={{ display:"grid", gap:10, marginBottom:16 }}>
                <div>
                  <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:4 }}>CB Base URL</div>
                  <input style={inputStyle} value={cbUrl} onChange={e=>setCbUrl(e.target.value)} placeholder="https://your-cb-instance.com" />
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                  <div>
                    <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:4 }}>Username</div>
                    <input style={inputStyle} value={cbUser} onChange={e=>setCbUser(e.target.value)} placeholder="admin" />
                  </div>
                  <div>
                    <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:4 }}>Password</div>
                    <input type="password" style={inputStyle} value={cbPass} onChange={e=>setCbPass(e.target.value)} placeholder="password" />
                  </div>
                </div>
                <div>
                  <div style={{ fontSize:12, color:"var(--text-secondary)", marginBottom:4 }}>
                    Stream name prefix
                    <span style={{ marginLeft:6, fontSize:11, opacity:0.7 }}>
                      — tags every stream this run creates so you can find/group them later (CB doesn't allow stream delete)
                    </span>
                  </div>
                  <input
                    style={inputStyle}
                    value={sessionPrefix}
                    onChange={e=>setSessionPrefix(e.target.value.replace(/[^\w-]/g, ""))}
                    placeholder="e.g. 260425-2103 (leave blank to disable)"
                  />
                </div>
              </div>

              {/* OpenAI */}
              <div style={{ fontSize:14, fontWeight:500, marginBottom:8 }}>OpenAI API Key</div>
              {useLocalProxy && backendHasKey ? (
                <div style={{ padding:"10px 14px", borderRadius:8, background:"#D1FAE5",
                  border:"1px solid #A7F3D0", fontSize:12, color:"#065F46", marginBottom:6 }}>
                  Using OPENAI_API_KEY from server environment variable.
                  <span onClick={() => setUseLocalProxy(false)}
                    style={{ marginLeft:8, cursor:"pointer", textDecoration:"underline" }}>
                    Use a different key
                  </span>
                </div>
              ) : (
                <div>
                  <input type="password" style={{...inputStyle, marginBottom:6}} value={openaiKey}
                    onChange={e=>{ setOpenaiKey(e.target.value); if (err) setErr(""); }} placeholder="sk-..." />
                  <div style={{ fontSize:11, color:"var(--text-tertiary)", marginBottom:6 }}>
                    Key is sent to the local backend proxy only (never to external servers from the browser).
                    {" "}
                    <span onClick={() => setUseLocalProxy(true)}
                      style={{ cursor:"pointer", textDecoration:"underline", color:"var(--text-secondary)" }}>
                      Use server env key
                    </span>
                  </div>
                </div>
              )}

              {err && (
                <div style={{ padding:"10px 14px", background:"var(--bg-danger)", border:"1px solid var(--border-danger)",
                  borderRadius:8, fontSize:12, color:"var(--text-danger)", marginTop:12, marginBottom:12 }}>
                  {err}
                </div>
              )}

              <div style={{ marginTop:16 }}>
                <button
                  style={(!domain.trim() || generating) ? btnDisabled : btnStyle(true)}
                  disabled={!domain.trim() || generating}
                  onClick={generateProjects}
                >
                  {generating ? genStage : "Generate Projects & Streams"}
                </button>
              </div>
            </div>
          )}

          {/* ══ Step 1: Projects ═════════════════════════════════════ */}
          {step === 1 && struct && (
            <div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                <div>
                  <div style={{ fontSize:15, fontWeight:500 }}>Projects for {struct.domain_name}</div>
                  <div style={{ fontSize:12, color:"var(--text-secondary)" }}>
                    Review and create each project in Codebeamer. Uses default template.
                  </div>
                </div>
                <button
                  style={creatingAllProjects ? { ...smallBtnStyle(true), opacity:0.5, cursor:"not-allowed" } : smallBtnStyle(true)}
                  disabled={creatingAllProjects}
                  onClick={createAllProjects}
                >
                  {creatingAllProjects ? "Creating..." : "Create All"}
                </button>
              </div>

              {/* Project Category */}
              <div style={{
                marginBottom:16, padding:"10px 14px", borderRadius:8,
                border: "1px solid #A7F3D0", background: "#D1FAE5",
                display:"flex", alignItems:"center", gap:8,
              }}>
                <span style={{ fontSize:16 }}>&#128193;</span>
                <div>
                  <div style={{ fontSize:13, fontWeight:500, color:"#065F46" }}>
                    Project Category: <span style={{ fontWeight:600 }}>{categoryName}</span>
                  </div>
                  <div style={{ fontSize:11, color:"#065F46", opacity:0.8 }}>
                    All projects will be created under this category in Codebeamer.
                  </div>
                </div>
              </div>

              {/* Render projects grouped by type */}
              {[
                { cat: "library", label: "Library Projects", desc: "Core subsystem projects (2 per library stream)", clr: "#0F6E56", bg: "#E1F5EE" },
                { cat: "product_line", label: "Product Line Projects", desc: "Cross-subsystem integration projects (1 per PL stream)", clr: "#534AB7", bg: "#EEEDFE" },
                { cat: "release", label: "Release Projects", desc: "Release-specific verification projects (1 per release stream)", clr: "#185FA5", bg: "#E6F1FB" },
              ].map(group => {
                const groupProjects = struct.projects.map((p, idx) => ({ ...p, _idx: idx })).filter(p => (p.category || "library") === group.cat);
                if (!groupProjects.length) return null;
                return (
                  <div key={group.cat} style={{ marginBottom:16 }}>
                    <div style={{
                      padding:"6px 10px", marginBottom:8, borderRadius:"0 6px 6px 0",
                      background: group.bg, borderLeft:`3px solid ${group.clr}`,
                    }}>
                      <span style={{ fontWeight:500, fontSize:13, color: group.clr }}>{group.label}</span>
                      <span style={{ fontSize:11, color: group.clr, opacity:.7, marginLeft:8 }}>
                        ({groupProjects.length}) &mdash; {group.desc}
                      </span>
                    </div>

                    {groupProjects.map(p => {
                      const idx = p._idx;
                      // Show which stream this PL/release project belongs to
                      const streamLabel = p.stream_key ? (() => {
                        const allStreams = [...(struct.product_line_streams||[]), ...(struct.release_streams||[])];
                        const s = allStreams.find(s => s.stream_key === p.stream_key);
                        return s ? s.stream_name : p.stream_key;
                      })() : null;

                      return (
                        <div key={idx} style={{
                          marginBottom:8, padding:"12px 14px", borderRadius:8,
                          border:`1px solid ${group.clr}30`, background:"var(--bg-secondary)",
                        }}>
                          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                            <div>
                              <div style={{ fontSize:14, fontWeight:500 }}>
                                {p.project_name}
                                {streamLabel && (
                                  <span style={{ fontSize:11, fontWeight:400, color: group.clr, marginLeft:8 }}>
                                    &#8594; {streamLabel}
                                  </span>
                                )}
                              </div>
                              <div style={{ fontSize:11, color:"var(--text-tertiary)" }}>
                                Key: {p.project_key} &middot; {p.description}
                              </div>
                            </div>
                            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                              <StatusBadge status={projectStatus[idx] || "pending"} />
                              {projectStatus[idx] !== "done" && projectStatus[idx] !== "creating" && (
                                <button style={smallBtnStyle(true)} onClick={() => createProject(idx)}>Create</button>
                              )}
                            </div>
                          </div>

                          {projectStatus[idx] === "done" && (
                            <div style={{ fontSize:12, color:"#065F46", background:"#D1FAE5", padding:"6px 10px", borderRadius:6 }}>
                              Project ID: {projectIds[idx]}
                              {projectTrackers[idx]?.reqTrackerId && ` | Req: ${projectTrackers[idx].reqTrackerName || projectTrackers[idx].reqTrackerId}`}
                              {projectTrackers[idx]?.tcTrackerId && ` | TC: ${projectTrackers[idx].tcTrackerName || projectTrackers[idx].tcTrackerId}`}
                              {projectTrackers[idx]?.verifiesFieldId && ` | Verifies field: ${projectTrackers[idx].verifiesFieldId}`}
                              {projectTrackers[idx]?.tcTrackerId && !projectTrackers[idx]?.verifiesFieldId && ` | Verifies field: not found`}
                            </div>
                          )}
                          {projectErrors[idx] && (
                            <div style={{ fontSize:12, color:"#991B1B", background:"#FEE2E2", padding:"6px 10px", borderRadius:6 }}>
                              {projectErrors[idx]}
                            </div>
                          )}

                          {projectStatus[idx] !== "done" && (
                            <div style={{ display:"grid", gridTemplateColumns:"1fr 2fr", gap:8, marginTop:8 }}>
                              <div>
                                <div style={{ fontSize:11, color:"var(--text-tertiary)", marginBottom:2 }}>Key (max 8)</div>
                                <input style={{...inputStyle, fontSize:12}} value={p.project_key}
                                  onChange={e => updateStruct(s => { s.projects[idx].project_key = e.target.value.substring(0,8).replace(/[^a-zA-Z0-9_]/g,""); })} />
                              </div>
                              <div>
                                <div style={{ fontSize:11, color:"var(--text-tertiary)", marginBottom:2 }}>Project Name</div>
                                <input style={{...inputStyle, fontSize:12}} value={p.project_name}
                                  onChange={e => updateStruct(s => { s.projects[idx].project_name = e.target.value; })} />
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              })}

              <div style={{ display:"flex", gap:10, marginTop:16 }}>
                <button style={btnStyle(false)} onClick={() => setStep(0)}>Back</button>
                <button
                  style={validating ? btnDisabled : btnStyle(true)}
                  disabled={validating}
                  onClick={() => validateAndProceed(2)}
                >
                  {validating ? "Validating projects..." : "Continue to Requirements"}
                </button>
              </div>
            </div>
          )}

          {/* ══ Step 2: Requirements & Test Cases ═══════════════════ */}
          {step === 2 && struct && (
            <div>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                <div>
                  <div style={{ fontSize:15, fontWeight:500 }}>Requirements & Test Cases</div>
                  <div style={{ fontSize:12, color:"var(--text-secondary)" }}>
                    5 requirements + 2 test cases per project. TC1 verifies reqs 1-3, TC2 verifies reqs 4-5.
                  </div>
                </div>
                <button
                  style={creatingAllReqs ? { ...smallBtnStyle(true), opacity:0.5, cursor:"not-allowed" } : smallBtnStyle(true)}
                  disabled={creatingAllReqs}
                  onClick={createAllReqs}
                >
                  {creatingAllReqs ? "Creating..." : "Create All"}
                </button>
              </div>

              {struct.projects.map((p, idx) => {
                const trackers = projectTrackers[idx];
                const reqs = p.requirements || [];
                return (
                  <div key={idx} style={{
                    marginBottom:12, padding:"12px 14px", borderRadius:8,
                    border:"1px solid var(--border-tertiary)", background:"var(--bg-secondary)",
                  }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                      <div>
                        <div style={{ fontSize:14, fontWeight:500 }}>{p.project_name}</div>
                        <div style={{ fontSize:11, color:"var(--text-tertiary)" }}>
                          {reqs.length} requirements &middot; {trackers?.reqTrackerName || `Req #${trackers?.reqTrackerId}` || "?"} &middot; {trackers?.tcTrackerName || `TC #${trackers?.tcTrackerId}` || "?"} {trackers?.verifiesFieldId ? `(Verifies: field ${trackers.verifiesFieldId})` : "(Verifies: not found)"}
                        </div>
                      </div>
                      <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <StatusBadge status={reqStatus[idx] || "pending"} />
                        {reqStatus[idx] !== "done" && reqStatus[idx] !== "creating" && (
                          <button style={smallBtnStyle(true)} onClick={() => createTrackerItems(idx)}>Create Items</button>
                        )}
                      </div>
                    </div>

                    <div style={{ maxHeight:200, overflowY:"auto", fontSize:12 }}>
                      {reqs.map((req, ri) => (
                        <div key={ri} style={{ padding:"5px 8px", marginBottom:2, borderRadius:4,
                          background:"var(--bg-primary)", border:"1px solid var(--border-tertiary)" }}>
                          <div style={{ fontWeight:500 }}>
